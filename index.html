<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VinhOS 6.0</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0d; touch-action: none; }
canvas { display: block; position: fixed; top: 0; left: 0; }
.overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); display: flex; align-items: center;
  justify-content: center; z-index: 50; padding: 16px;
}
.overlay.hidden { display: none; }
.panel {
  background: rgba(18,18,26,0.98); border: 1px solid rgba(60,60,85,0.9);
  border-radius: 16px; padding: 22px; color: #f5f5f8;
  font-family: Arial, sans-serif; width: 100%; max-width: 520px;
  max-height: 90vh; overflow-y: auto;
}
.panel h2 { font-size: clamp(16px,4vw,20px); margin-bottom: 14px; }
.panel label { font-size: 12px; color: #5f5f69; display: block; margin-bottom: 6px; }
input[type=text], textarea {
  width: 100%; background: rgba(30,30,44,0.95); border: 1.5px solid rgba(85,155,255,0.4);
  border-radius: 9px; color: #f5f5f8; font-size: 15px; padding: 10px 13px;
  outline: none; font-family: Arial, sans-serif; -webkit-appearance: none;
}
input[type=text]:focus, textarea:focus { border-color: #559bff; }
textarea { resize: none; height: 80px; }
.btn-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
button {
  border: none; border-radius: 9px; padding: 10px 16px; cursor: pointer;
  font-family: Arial, sans-serif; font-weight: bold; font-size: 13px;
  transition: filter 0.12s; white-space: nowrap;
}
button:active { filter: brightness(0.82); }
#mobileInput {
  position: fixed; bottom: 0; left: 0; width: 100%;
  background: rgba(18,18,26,0.97); border-top: 1px solid rgba(60,60,85,0.8);
  padding: 10px 12px; z-index: 40; display: none; flex-wrap: wrap; gap: 8px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
}
#mobileInput.show { display: flex; }
#mobileTextField {
  flex: 1; min-width: 120px; background: rgba(30,30,44,0.95);
  border: 1.5px solid rgba(85,155,255,0.4); border-radius: 9px;
  color: #f5f5f8; font-size: 16px; padding: 9px 12px; outline: none;
  font-family: Arial, sans-serif; -webkit-appearance: none;
}
#mobileTextField:focus { border-color: #559bff; }
.mob-btn {
  background: rgba(55,55,72,0.92); color: #f5f5f8; border: none;
  border-radius: 9px; padding: 9px 13px; font-size: 13px; font-weight: bold;
  cursor: pointer;
}
#shareToast {
  position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
  background: rgba(18,18,26,0.96); border: 1px solid rgba(85,155,255,0.5);
  color: #f5f5f8; padding: 11px 22px; border-radius: 10px; font-size: 14px;
  z-index: 60; opacity: 0; transition: opacity 0.3s; pointer-events: none;
  font-family: Arial, sans-serif;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="bgPanel" class="overlay hidden">
  <div class="panel">
    <h2>Background Settings</h2>
    <label>Image or video URL — drag and drop also works</label>
    <input id="bgPathInput" type="text" placeholder="Paste URL here…" style="margin-bottom:10px">
    <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      <button id="bgBtnImport" style="background:#559bff;color:#0c0c0e">Import File</button>
      <button id="bgBtnMenu"   style="background:#3c3c4e;color:#f5f5f8">Menu</button>
      <button id="bgBtnDisplay"style="background:#3c3c4e;color:#f5f5f8">Display</button>
      <button id="bgBtnBoth"   style="background:#559bff;color:#0c0c0e">Both</button>
    </div>
    <div class="btn-row">
      <button id="bgBtnLoad"  style="background:#559bff;color:#0c0c0e">Load</button>
      <button id="bgBtnClear" style="background:#7a1e1e;color:#fff">Clear</button>
      <button id="bgBtnClose" style="background:#3c3c4e;color:#f5f5f8">Close</button>
    </div>
    <div id="bgMsg"  style="margin-top:10px;font-size:13px;min-height:16px"></div>
    <div id="bgInfo" style="margin-top:8px;font-size:12px;color:#5f5f69;line-height:1.6"></div>
    <input type="file" id="bgFileInput" accept="image/*,video/*" style="display:none">
  </div>
</div>

<div id="notePanel" class="overlay hidden">
  <div class="panel">
    <h2 id="notePanelTitle"></h2>
    <label>Shown at bottom of screen during presentation</label>
    <textarea id="noteInput" placeholder="Type note here…"></textarea>
    <div class="btn-row">
      <button id="noteSave"   style="background:#2ea858;color:#fff">Save</button>
      <button id="noteClear"  style="background:#7a1e1e;color:#fff">Clear</button>
      <button id="noteCancel" style="background:#3c3c4e;color:#f5f5f8">Cancel</button>
    </div>
  </div>
</div>

<div id="sharePanel" class="overlay hidden">
  <div class="panel">
    <h2>Share Presentation</h2>
    <label>Copy this link — anyone who opens it sees your slides directly</label>
    <input id="shareLinkInput" type="text" readonly style="margin-bottom:10px;cursor:pointer">
    <div class="btn-row">
      <button id="shareCopy"  style="background:#559bff;color:#0c0c0e">Copy Link</button>
      <button id="shareClose" style="background:#3c3c4e;color:#f5f5f8">Close</button>
    </div>
    <div id="shareMsg" style="margin-top:8px;font-size:13px;min-height:16px;color:#2ea858"></div>
  </div>
</div>

<div id="mobileInput">
  <input id="mobileTextField" type="text" placeholder="Type word…"
    autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  <button class="mob-btn" id="mobConfirm">Add</button>
  <button class="mob-btn" id="mobPaste">Paste</button>
  <button class="mob-btn" id="mobDone" style="background:rgba(85,155,255,0.28)">Done</button>
</div>

<div id="shareToast"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W = window.innerWidth, H = window.innerHeight;
canvas.width = W; canvas.height = H;

const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || (window.matchMedia('(pointer:coarse)').matches && W < 1100);

window.addEventListener('resize', () => {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
  lastHash = null;
});

const LERP = 10.5, FLASH_SPD = 19.0, NEN = 0.89;
const C_WHITE = '#f5f5f8', C_DIM = '#5f5f69', C_ACC = '#559bff';
const C_GROUP = '#32e6b4', C_NOTE = '#ffc83c', C_GLOW = '#b478ff';
const COLORS = ['#f5f5f8','#ff5555','#55eb55','#4ba5ff','#ffff6e','#ff87eb','#a55fff','#ff9b4b','#00ffd2','#ff4baf','#9bff41','#d2d2e1'];
const MARGIN_W = isMobile ? 36 : 100, MARGIN_H = isMobile ? 50 : 88;

let state = 'MENU';
let textData = [];
let wordIndex = 0, startIdx = 0;
let activeAnims = [], lastHash = null;
let cSize = 20, cData = [];
let groupCounters = {};
let isCleared = true;
let editingIndex = -1, inputBuffer = '', currentColor = C_WHITE;
let flashTimer = 0, globalTimer = 0;
let starSpawned = new Set(), glowSpawned = new Set();
let glowTrickle = 0, bottomNote = null;
let groupSel = [], ctrlDown = false, nextGid = 0;
let bgPickTarget = 'both', noteEditIdx = -1, wordRects = [];
let particles = [], glowStars = [], glowRings = [];
let lastTime = performance.now();
let bgZoomTimer = 0;

const bgSrc = { menu: null, display: null };
const bgVid = { menu: null, display: null };
const bgPath = { menu: '', display: '' };

function loadBg(src, target) {
  const isVid = /\.(mp4|webm|ogg|mov|avi)(\?|#|$)/i.test(src);
  const set = t => {
    if (isVid) {
      if (bgVid[t]) { bgVid[t].pause(); bgVid[t].src = ''; }
      const v = document.createElement('video');
      v.src = src; v.loop = true; v.muted = true; v.autoplay = true; v.playsInline = true;
      v.play().catch(() => {});
      bgVid[t] = v; bgSrc[t] = null; bgPath[t] = src;
    } else {
      if (bgVid[t]) { bgVid[t].pause(); bgVid[t].src = ''; bgVid[t] = null; }
      const img = new Image(); img.crossOrigin = 'anonymous';
      img.onload = () => { bgSrc[t] = img; };
      img.onerror = () => showBgMsg('Cannot load image', false);
      img.src = src; bgPath[t] = src;
    }
  };
  target === 'both' ? (set('menu'), set('display')) : set(target);
}

function clearBg(target) {
  const clr = t => {
    if (bgVid[t]) { bgVid[t].pause(); bgVid[t].src = ''; bgVid[t] = null; }
    bgSrc[t] = null; bgPath[t] = '';
  };
  target === 'both' ? (clr('menu'), clr('display')) : clr(target);
}

function drawBg(which, dim, zoom) {
  const vid = bgVid[which], img = bgSrc[which], src = vid || img;
  if (!src) return;
  if (vid && (vid.readyState < 2 || !vid.videoWidth)) return;
  const sw = vid ? vid.videoWidth : img.naturalWidth;
  const sh = vid ? vid.videoHeight : img.naturalHeight;
  if (!sw || !sh) return;
  const scale = Math.max(W / sw, H / sh) * (zoom || 1);
  const nw = sw * scale, nh = sh * scale;
  ctx.save();
  ctx.drawImage(src, (W - nw) / 2, (H - nh) / 2, nw, nh);
  ctx.fillStyle = `rgba(0,0,0,${dim})`;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
}

function showBgMsg(txt, ok) {
  const el = document.getElementById('bgMsg');
  el.textContent = txt; el.style.color = ok ? '#2ea858' : '#eb4141';
  updateBgInfo();
}

function updateBgInfo() {
  document.getElementById('bgInfo').innerHTML =
    `Menu: ${bgPath.menu ? '...' + bgPath.menu.slice(-28) : '—'}<br>Display: ${bgPath.display ? '...' + bgPath.display.slice(-28) : '—'}`;
}

const P_PAL = [[255,225,70],[255,195,35],[195,165,25],[230,230,230],[170,215,255],[255,155,195],[155,255,195],[195,155,255],[255,255,115],[115,255,255]];
const P_SHP = ['star4','star6','diamond','dot','line'];

class Particle {
  constructor(cx, cy, sw, sh) {
    const a = Math.random() * Math.PI * 2, s = 55 + Math.random() * 190;
    this.vx = Math.cos(a)*s; this.vy = Math.sin(a)*s - (35+Math.random()*75);
    this.x = cx+(Math.random()-0.5)*sw; this.y = cy+(Math.random()-0.5)*sh*0.6;
    this.life = 1; this.decay = 0.52+Math.random()*0.73;
    this.size = 3.5+Math.random()*7.5; this.rot = Math.random()*Math.PI*2;
    this.rotv = (Math.random()-0.5)*14; this.grav = 50+Math.random()*85;
    this.shape = P_SHP[Math.floor(Math.random()*P_SHP.length)];
    this.color = P_PAL[Math.floor(Math.random()*P_PAL.length)];
  }
  update(dt) {
    this.x+=this.vx*dt; this.y+=this.vy*dt; this.vy+=this.grav*dt; this.rot+=this.rotv*dt;
    this.life-=this.decay*dt; return this.life>0;
  }
  draw() {
    const r = Math.max(1,this.size*this.life), [R,G,B] = this.color;
    ctx.save(); ctx.globalAlpha=Math.max(0,this.life);
    ctx.translate(this.x,this.y); ctx.rotate(this.rot);
    ctx.fillStyle=ctx.strokeStyle=`rgb(${R},${G},${B})`;
    if (this.shape==='dot') { ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill(); }
    else if (this.shape==='line') { ctx.lineWidth=Math.max(1,r/3); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(r,0); ctx.stroke(); }
    else {
      const n=this.shape==='star6'?6:this.shape==='diamond'?2:4;
      ctx.beginPath();
      for (let i=0;i<n*2;i++){const ang=i*Math.PI/n,rad=i%2===0?r:r*0.42;i===0?ctx.moveTo(Math.cos(ang)*rad,Math.sin(ang)*rad):ctx.lineTo(Math.cos(ang)*rad,Math.sin(ang)*rad);}
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  }
}

const GLOW_COLS = [[200,160,255],[255,200,80],[100,220,255],[255,140,200],[160,255,180],[255,255,180]];

class GlowStar {
  constructor() {
    const side=['left','right','top','bottom'][Math.floor(Math.random()*4)];
    if(side==='left'){this.x=-20;this.y=Math.random()*H;this.vx=35+Math.random()*60;this.vy=(Math.random()-0.5)*40;}
    if(side==='right'){this.x=W+20;this.y=Math.random()*H;this.vx=-(35+Math.random()*60);this.vy=(Math.random()-0.5)*40;}
    if(side==='top'){this.x=Math.random()*W;this.y=-20;this.vx=(Math.random()-0.5)*40;this.vy=35+Math.random()*60;}
    if(side==='bottom'){this.x=Math.random()*W;this.y=H+20;this.vx=(Math.random()-0.5)*40;this.vy=-(35+Math.random()*60);}
    this.size=4+Math.random()*9; this.rot=Math.random()*Math.PI*2;
    this.rotv=(Math.random()-0.5)*4.4; this.pulse=Math.random()*Math.PI*2;
    this.color=GLOW_COLS[Math.floor(Math.random()*GLOW_COLS.length)]; this.alive=true;
  }
  kill(){this.alive=false;}
  update(dt){
    if(!this.alive)return false;
    this.x+=this.vx*dt; this.y+=this.vy*dt; this.rot+=this.rotv*dt; this.pulse+=3.8*dt;
    return this.x>-80&&this.x<W+80&&this.y>-80&&this.y<H+80;
  }
  draw(){
    const pv=0.78+0.22*Math.sin(this.pulse),r=Math.max(2,this.size*pv),a=Math.min(1,0.82*pv),[R,G,B]=this.color;
    ctx.save(); ctx.translate(this.x,this.y); ctx.rotate(this.rot);
    const g=ctx.createRadialGradient(0,0,0,0,0,r*3);
    g.addColorStop(0,`rgba(${R},${G},${B},${a*0.5})`);
    g.addColorStop(0.4,`rgba(${R},${G},${B},${a*0.18})`);
    g.addColorStop(1,`rgba(${R},${G},${B},0)`);
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,r*3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=`rgba(${R},${G},${B},${a})`;
    ctx.beginPath();
    for(let i=0;i<8;i++){const ang=i*Math.PI/4,rad=i%2===0?r:r*0.38;i===0?ctx.moveTo(Math.cos(ang)*rad,Math.sin(ang)*rad):ctx.lineTo(Math.cos(ang)*rad,Math.sin(ang)*rad);}
    ctx.closePath(); ctx.fill();
    ctx.fillStyle=`rgba(255,255,255,${a*0.55})`;
    ctx.beginPath();
    for(let i=0;i<8;i++){const ang=i*Math.PI/4+Math.PI/4,rad=i%2===0?r*0.45:r*0.17;i===0?ctx.moveTo(Math.cos(ang)*rad,Math.sin(ang)*rad):ctx.lineTo(Math.cos(ang)*rad,Math.sin(ang)*rad);}
    ctx.closePath(); ctx.fill(); ctx.restore();
  }
}

class GlowRing {
  constructor(cx,cy,color){this.x=cx;this.y=cy;this.r=0;this.maxR=60+Math.random()*100;this.life=1;this.decay=0.4+Math.random()*0.5;this.speed=80+Math.random()*100;this.color=color;}
  update(dt){this.r+=this.speed*dt;this.life-=this.decay*dt;return this.life>0&&this.r<this.maxR*1.2;}
  draw(){
    if(this.r<2)return;
    ctx.save();ctx.globalAlpha=Math.max(0,this.life*0.62);ctx.strokeStyle=this.color;ctx.lineWidth=Math.max(1,3*this.life);
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.stroke();ctx.restore();
  }
}

function spawnParticles(cx,cy,sw,sh,n=68){for(let i=0;i<n;i++)particles.push(new Particle(cx,cy,sw,sh));}
function spawnGlow(cx,cy,color,ns=20,nr=4){for(let i=0;i<ns;i++)glowStars.push(new GlowStar());for(let i=0;i<nr;i++)glowRings.push(new GlowRing(cx,cy,color));}

class BurstChar {
  constructor(ch,cx,cy,color,size){
    this.ch=ch;this.color=color;this.size=size;this.x=cx;this.y=cy;
    const a=Math.random()*Math.PI*2,s=310+Math.random()*370;
    this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s;
    this.rot=Math.random()*Math.PI*2;this.rotv=(Math.random()-0.5)*56;
    this.life=1;this.decay=0.48+Math.random()*0.44;
  }
  update(dt){
    this.x+=this.vx*dt;this.y+=this.vy*dt;
    const d=this.life>0.65?6.8:2.4;this.vx*=1-d*dt;this.vy*=1-d*dt;this.vy+=48*dt;
    this.rot+=this.rotv*dt;this.rotv*=0.91;this.life-=this.decay*dt;return this.life>0;
  }
  draw(m){
    ctx.save();ctx.globalAlpha=Math.max(0,(m/255)*this.life);
    ctx.font=`bold ${this.size}px Arial`;ctx.fillStyle=this.color;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.translate(this.x,this.y);ctx.rotate(this.rot);ctx.scale(NEN,1);
    ctx.fillText(this.ch,0,0);ctx.restore();
  }
}

class WordAnim {
  constructor(word,sx,sy,color,liss,flash,star,burst,glow,gid,note,idx,delay){
    this.word=word;this.color=color;this.liss=liss;this.flash=flash;this.star=star;
    this.burst=burst;this.glow=glow;this.gid=gid;this.note=note;this.wordIdx=idx;this.groupDelay=delay;
    this.curX=sx;this.curY=sy+80;this.curSize=5;this.alpha=0;
    this.timer=Math.random()*5;this.flashActive=flash;
    this.burstChars=[];this.burstBuilt=false;this.burstTimer=0;
    this.groupRevealed=gid<0;this.groupTimer=0;
  }
  _buildBurst(size){
    this.burstChars=[];ctx.font=`bold ${size}px Arial`;
    const tw=ctx.measureText(this.word).width*NEN;let x=this.curX-tw/2;
    for(const ch of this.word){if(!ch.trim())continue;const cw=ctx.measureText(ch).width*NEN;this.burstChars.push(new BurstChar(ch,x+cw/2,this.curY,this.color,size));x+=cw;}
  }
  update(dt,tx,ty,ts,fo){
    this.timer+=dt;
    if(this.gid>=0&&!this.groupRevealed){this.groupTimer+=dt;if(this.groupTimer>=this.groupDelay)this.groupRevealed=true;else{this.curX=tx;this.curY=ty;return;}}
    let fx=tx,fy=ty;
    if(this.liss){fx+=Math.cos(this.timer*1.5)*12;fy+=Math.sin(this.timer*3)*8;}
    this.curX+=(fx-this.curX)*LERP*dt;this.curY+=(fy-this.curY)*LERP*dt;
    this.curSize+=(ts-this.curSize)*LERP*dt;this.alpha+=(255-this.alpha)*LERP*dt;
    if(this.burst){
      this.burstTimer+=dt;
      if(!this.burstBuilt&&this.burstTimer>=1.35){this.burstBuilt=true;this._buildBurst(Math.round(this.curSize));}
      if(this.burstBuilt){this.burstChars=this.burstChars.filter(c=>c.update(dt));this.alpha=Math.max(30,this.alpha-420*dt);}
    }
  }
  getColor(fo){
    if(this.liss){const c=(Math.sin(this.timer*0.8)+1)/2;return`rgb(${Math.round(100+100*c)},${Math.round(150+105*(1-c))},255)`;}
    if(this.flash&&this.flashActive&&fo)return'#0a0a0a';
    return this.color;
  }
  draw(fo){
    if(!this.groupRevealed||this.alpha<2)return;
    if(this.burst&&this.burstBuilt){this.burstChars.forEach(c=>c.draw(this.alpha));return;}
    const a=Math.min(1,this.alpha/255),s=Math.round(this.curSize);if(s<2)return;
    ctx.save();ctx.globalAlpha=a;
    ctx.font=`bold ${s}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    const col=this.getColor(fo);
    if(this.glow){
      const tw=ctx.measureText(this.word).width*NEN,pulse=0.5+0.5*Math.sin(this.timer*3.2),ga=(0.12+0.10*pulse)*a;
      const gr=ctx.createRadialGradient(this.curX,this.curY,0,this.curX,this.curY,tw*0.7+s*0.5);
      gr.addColorStop(0,`rgba(180,120,255,${ga*1.8})`);gr.addColorStop(0.5,`rgba(180,120,255,${ga})`);gr.addColorStop(1,'rgba(180,120,255,0)');
      const pad=s*0.14;ctx.fillStyle=gr;ctx.fillRect(this.curX-tw/2-pad*3,this.curY-s*0.6-pad*2,tw+pad*6,s*1.2+pad*4);
    }
    if(this.flash&&!this.liss&&this.flashActive&&fo){
      const tw=ctx.measureText(this.word).width*NEN,pad=s*0.18;ctx.fillStyle='#f5f5f5';
      ctx.beginPath();ctx.roundRect(this.curX-tw/2-pad,this.curY-s*0.55-pad/2,tw+pad*2,s*1.1+pad,8);ctx.fill();
    }
    if(this.liss){
      ctx.globalAlpha=a*0.16;ctx.fillStyle=col;ctx.scale(NEN,1);ctx.fillText(this.word,(this.curX+4)/NEN,this.curY+4);
      ctx.setTransform(1,0,0,1,0,0);ctx.globalAlpha=a;ctx.font=`bold ${s}px Arial`;
    }
    ctx.fillStyle=col;ctx.scale(NEN,1);ctx.fillText(this.word,this.curX/NEN,this.curY);
    ctx.setTransform(1,0,0,1,0,0);ctx.globalAlpha=a;
    if(this.note){ctx.fillStyle=C_NOTE;ctx.beginPath();ctx.arc(this.curX+ctx.measureText(this.word).width*NEN/2+6,this.curY-s*0.45,5,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  }
}

class BottomNote {
  constructor(text){this.text=text;this.alpha=0;this.curY=H+40;this.targetY=H-(isMobile?58:70);this.timer=0;}
  update(dt){this.timer+=dt;this.alpha=Math.min(255,this.alpha+380*dt);this.curY+=(this.targetY-this.curY)*11*dt;}
  draw(){
    if(this.alpha<2)return;
    const a=this.alpha/255,fs=isMobile?15:20;
    ctx.font=`${fs}px Arial`;
    const maxW=Math.min(isMobile?W-50:700,W-50),words=this.text.split(' '),lines=[];let cur='';
    for(const w of words){const t=cur?cur+' '+w:w;if(ctx.measureText(t).width>maxW){if(cur)lines.push(cur);cur=w;}else cur=t;}
    if(cur)lines.push(cur);
    const lh=fs+6,pad=13,tw=Math.max(...lines.map(l=>ctx.measureText(l).width));
    const bw=tw+pad*2,bh=lh*lines.length+pad*2,bx=W/2-bw/2,by=this.curY-bh/2;
    const pulse=Math.sin(this.timer*2.8)*0.5+0.5;
    ctx.save();
    ctx.globalAlpha=a*0.44;ctx.fillStyle='#000';ctx.shadowColor='#000';ctx.shadowBlur=14;
    ctx.beginPath();ctx.roundRect(bx-5,by-5,bw+10,bh+10,13);ctx.fill();
    ctx.shadowBlur=0;ctx.globalAlpha=a*0.88;ctx.fillStyle='rgba(15,14,24,0.92)';
    ctx.beginPath();ctx.roundRect(bx,by,bw,bh,11);ctx.fill();
    ctx.globalAlpha=(0.62+0.24*pulse)*a;ctx.strokeStyle=C_NOTE;ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(bx,by,bw,bh,11);ctx.stroke();
    ctx.globalAlpha=a;ctx.fillStyle=C_NOTE;ctx.textAlign='center';ctx.textBaseline='middle';ctx.font=`${fs}px Arial`;
    lines.forEach((l,i)=>ctx.fillText(l,W/2,by+pad+i*lh+lh/2-2));
    ctx.restore();
  }
}

function calcLayout(){
  const list=textData.slice(startIdx,wordIndex);
  if(!list.length){cData=[];return;}
  const areaW=W-MARGIN_W*2,areaH=H-MARGIN_H*2;
  let size=isMobile?200:300;
  while(size>8){
    ctx.font=`bold ${size}px Arial`;const spW=ctx.measureText(' ').width*NEN;
    let lines=[],curLine=[],curW=0,fits=true;
    for(const wd of list){
      const ww=ctx.measureText(wd[0]).width*NEN;if(ww>areaW){fits=false;break;}
      const pg=curLine.length?curLine[curLine.length-1][6]:-1,gap=pg>=0&&pg===wd[6]?0:spW;
      if(curW+gap+ww<=areaW){curLine.push([...wd,ww]);curW+=gap+ww;}else{lines.push(curLine);curLine=[[...wd,ww]];curW=ww;}
    }
    if(!fits){size-=4;continue;}
    if(curLine.length)lines.push(curLine);
    const lh=size*1.22,th=lines.length*lh;
    if(th<=areaH){
      const pos=[],sy=(H-th)/2;
      for(let ri=0;ri<lines.length;ri++){
        const row=lines[ri];let rw=0;
        for(let j=0;j<row.length;j++){const pg=j>0?row[j-1][6]:-1;rw+=row[j][row[j].length-1]+(j>0&&pg>=0&&pg===row[j][6]?0:j>0?spW:0);}
        let xo=(W-rw)/2;
        for(let j=0;j<row.length;j++){
          const it=row[j],ww=it[it.length-1];
          pos.push([it[0],xo+ww/2,sy+ri*lh+lh/2,it[1],it[2],it[3],it[4],it[5],it[6],it[7],it[8]]);
          const ng=j+1<row.length?row[j+1][6]:-1;xo+=ww+(ng>=0&&ng===it[6]?0:spW);
        }
      }
      cSize=size;cData=pos;return;
    }
    size-=4;
  }
  cSize=8;cData=[];
}

function rehash(){return textData.slice(startIdx,wordIndex).map(r=>r.join(',')).join('|');}

const SW=isMobile?34:42,SH=isMobile?34:42,SX0=14,SY0=14,SCOLS=6;
const EBW=isMobile?96:114,EBH=isMobile?36:42;
const EFF_DEFS=[{label:'WAVE',color:'#00e1a5',idx:2},{label:'FLASH',color:'#ffd71e',idx:3},{label:'STAR',color:'#ffa028',idx:4},{label:'BURST',color:'#ff55b9',idx:5},{label:'GLOW',color:C_GLOW,idx:8}];
function EBX(){return W-EBW-(isMobile?10:18);}
function effBtnRects(){return EFF_DEFS.map((e,i)=>({...e,rect:{x:EBX(),y:14+i*(EBH+7),w:EBW,h:EBH}}));}
function groupBtnRect(){return{x:EBX(),y:14+EFF_DEFS.length*(EBH+7),w:EBW,h:EBH};}
function noteBtnRect(){return{x:EBX(),y:14+EFF_DEFS.length*(EBH+7)+EBH+7,w:EBW,h:EBH};}
function swatchRects(){return COLORS.map((c,i)=>({color:c,rect:{x:SX0+(i%SCOLS)*(SW+6),y:SY0+Math.floor(i/SCOLS)*(SH+6),w:SW,h:SH}}));}
function boxRect(){
  const swBot=SY0+2*(SH+6)+6,hintH=isMobile?0:40,mobH=isMobile?64:0;
  return{x:14,y:swBot+10,w:W-EBW-(isMobile?32:48),h:H-swBot-hintH-mobH-22};
}
function hitRect(r,mx,my){return mx>=r.x&&mx<=r.x+r.w&&my>=r.y&&my<=r.y+r.h;}
function drawRR(x,y,w,h,r,fill,stroke,lw){ctx.beginPath();ctx.roundRect(x,y,w,h,r);if(fill){ctx.fillStyle=fill;ctx.fill();}if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw||1;ctx.stroke();}}
function drawBtn(x,y,w,h,label,bg,fg,fs){ctx.save();drawRR(x,y,w,h,9,bg);ctx.fillStyle=fg||'#f5f5f8';ctx.font=`bold ${fs||14}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label,x+w/2,y+h/2);ctx.restore();}

function drawInputState(){
  swatchRects().forEach(({color,rect:r})=>{
    drawRR(r.x,r.y,r.w,r.h,7,color);
    if(color===currentColor){ctx.save();ctx.strokeStyle='#fff';ctx.lineWidth=2.5;ctx.beginPath();ctx.roundRect(r.x-4,r.y-4,r.w+8,r.h+8,10);ctx.stroke();ctx.restore();}
  });
  const nb=noteBtnRect();
  ctx.save();ctx.globalAlpha=0.62;drawRR(EBX()-9,10,EBW+18,nb.y+nb.h+6,13,'rgba(18,18,26,0.95)');ctx.restore();
  effBtnRects().forEach(({label,color,idx,rect:r})=>{
    const active=editingIndex>=0&&textData[editingIndex]&&textData[editingIndex][idx];
    drawBtn(r.x,r.y,r.w,r.h,label,active?color:'#3c3c4e',active?'#0c0c0e':'#f5f5f8',isMobile?12:14);
    if(active){ctx.save();ctx.fillStyle=color;ctx.beginPath();ctx.arc(r.x+r.w-7,r.y+7,4,0,Math.PI*2);ctx.fill();ctx.restore();}
  });
  const gb=groupBtnRect(),gA=editingIndex>=0&&textData[editingIndex]&&textData[editingIndex][6]>=0,gH=groupSel.length>=2;
  drawBtn(gb.x,gb.y,gb.w,gb.h,'GROUP',gA||gH?C_GROUP:'#3c3c4e',gA||gH?'#0c0c0e':'#f5f5f8',13);
  const nA=editingIndex>=0&&textData[editingIndex]?.[7];
  drawBtn(nb.x,nb.y,nb.w,nb.h,'NOTE',nA?C_NOTE:'#3c3c4e',nA?'#0c0c0e':'#f5f5f8',13);

  const bx=boxRect();
  ctx.save();ctx.globalAlpha=0.75;drawRR(bx.x,bx.y,bx.w,bx.h,11,'rgba(18,18,26,0.92)');ctx.globalAlpha=1;ctx.strokeStyle='#252535';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(bx.x,bx.y,bx.w,bx.h,11);ctx.stroke();ctx.restore();

  const fs=Math.max(isMobile?20:24,Math.floor(bx.h/(isMobile?24:28)));
  ctx.font=`bold ${fs}px Arial`;const spW=ctx.measureText(' ').width*NEN,lh=fs*1.3,maxBW=bx.w-30;
  let lines=[],curLine=[],curX=0;
  const all=textData.map((wd,i)=>{const d=i===editingIndex?inputBuffer:wd[0],c=i===editingIndex?currentColor:wd[1];return{d,c,ww:ctx.measureText(d).width*NEN,i,liss:wd[2],fl:wd[3],st:wd[4],bu:wd[5],gid:wd[6],note:wd[7],glow:wd[8]};});
  if(editingIndex<0&&inputBuffer){const ww=ctx.measureText(inputBuffer).width*NEN;all.push({d:inputBuffer,c:currentColor,ww,i:-1,liss:false,fl:false,st:false,bu:false,gid:-1,note:'',glow:false});}
  for(const wd of all){const pg=curLine.length?curLine[curLine.length-1].gid:-1,gap=pg>=0&&pg===wd.gid?0:spW;if(curX+gap+wd.ww>maxBW){lines.push(curLine);curLine=[wd];curX=wd.ww;}else{curLine.push(wd);curX+=gap+wd.ww;}}
  if(curLine.length)lines.push(curLine);

  const maxVis=Math.max(1,Math.floor((bx.h-24)/lh));
  wordRects=[];
  ctx.save();ctx.beginPath();ctx.rect(bx.x,bx.y,bx.w,bx.h);ctx.clip();
  const vs=Math.max(0,lines.length-maxVis);
  for(let ri=vs;ri<lines.length;ri++){
    let dx=bx.x+14,dy=bx.y+12+(ri-vs)*lh;
    const row=lines[ri];
    for(let j=0;j<row.length;j++){
      const wd=row[j];if(j>0){const pg=row[j-1].gid;dx+=pg>=0&&pg===wd.gid?0:spW;}
      if(wd.i>=0)wordRects.push({x:dx,y:dy,w:wd.ww,h:lh,idx:wd.i});
      if(wd.i===editingIndex){ctx.save();ctx.globalAlpha=0.35;drawRR(dx-5,dy-2,wd.ww+10,lh+4,7,'rgba(85,115,195,0.8)');ctx.restore();}
      if(groupSel.includes(wd.i)){ctx.save();ctx.globalAlpha=0.25;drawRR(dx-5,dy-2,wd.ww+10,lh+4,7,C_GROUP);ctx.globalAlpha=0.7;ctx.strokeStyle=C_GROUP;ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(dx-5,dy-2,wd.ww+10,lh+4,7);ctx.stroke();ctx.restore();}
      if(wd.gid>=0){ctx.save();ctx.globalAlpha=0.4;ctx.fillStyle=C_GROUP;ctx.fillRect(dx-2,dy+lh-3,wd.ww+4,3);ctx.restore();}
      let dotX=dx+wd.ww+5;
      for(const[flag,col]of[[wd.liss,'#00e1a5'],[wd.fl,'#ffd71e'],[wd.st,'#ffa028'],[wd.bu,'#ff55b9'],[wd.glow,C_GLOW],[wd.gid>=0,C_GROUP],[!!wd.note,C_NOTE]]){if(flag){ctx.save();ctx.fillStyle=col;ctx.beginPath();ctx.arc(dotX,dy+lh/2,3.5,0,Math.PI*2);ctx.fill();ctx.restore();dotX+=9;}}
      ctx.save();ctx.font=`bold ${fs}px Arial`;ctx.fillStyle=wd.c;ctx.textAlign='left';ctx.textBaseline='top';ctx.scale(NEN,1);ctx.fillText(wd.d,dx/NEN,dy+2);ctx.restore();
      dx+=wd.ww;
    }
  }
  ctx.restore();

  if(Math.floor(globalTimer*2)%2===0){
    let cx2,cy2;
    if(wordRects.length){const lr=wordRects[wordRects.length-1];cx2=lr.x+lr.w+4;cy2=lr.y+4;}else{cx2=bx.x+16;cy2=bx.y+14;}
    ctx.fillStyle=C_ACC;ctx.fillRect(cx2,cy2,2.5,lh-8);
  }
  if(!isMobile){
    ctx.fillStyle=C_DIM;ctx.font='11px Arial';ctx.textAlign='left';ctx.textBaseline='middle';
    let hx=14;
    for(const h of['SPACE=add','ENTER=done','BKSP=delete','Ctrl+A=clear','Click=edit']){const tw=ctx.measureText(h).width;if(hx+tw<W-EBW-28){ctx.fillText(h,hx,H-26);hx+=tw+14;}}
  }
}

function menuBtnList(){
  const bw=isMobile?Math.min(W-32,280):258,bh=isMobile?52:58,bx=W/2-bw/2;
  return[['START','#559bff'],['EDIT','#3c3c4e'],['BACKGROUND','#3c3c4e'],['SHARE','#2ea858']].map(([l,c],i)=>({label:l,color:c,rect:{x:bx,y:H/2-(isMobile?115:125)+i*(bh+10),w:bw,h:bh}}));
}

function drawMenu(){
  ctx.save();
  ctx.font=`bold ${isMobile?54:78}px Arial`;ctx.fillStyle='rgba(245,245,248,0.92)';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('VinhOS',W/2,H/2-(isMobile?148:194));
  ctx.font=`${isMobile?15:18}px Arial`;ctx.fillStyle=C_DIM;ctx.fillText('v6.0',W/2,H/2-(isMobile?112:155));
  ctx.restore();
  menuBtnList().forEach(({label,color,rect:r})=>drawBtn(r.x,r.y,r.w,r.h,label,color,'#f5f5f8',isMobile?19:23));
  if(!isMobile){const r={x:W-196,y:18,w:174,h:40};drawBtn(r.x,r.y,r.w,r.h,'FULLSCREEN','#2a2a3c','#f5f5f8',13);}
  if(bgPath.menu||bgPath.display){
    const p=[bgPath.menu&&`Menu:...${bgPath.menu.slice(-18)}`,bgPath.display&&`Display:...${bgPath.display.slice(-18)}`].filter(Boolean);
    ctx.fillStyle=C_DIM;ctx.font='12px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.join(' | '),W/2,H-44);
  }
}

function menuHitAt(mx,my){
  for(const{label,rect:r}of menuBtnList())if(hitRect(r,mx,my))return label;
  if(!isMobile){const r={x:W-196,y:18,w:174,h:40};if(hitRect(r,mx,my))return'FULLSCREEN';}
  return null;
}

function drawCleared(){
  ctx.save();
  const dsp=isMobile?65:88,dbx=W/2-dsp,dby=H/2;
  for(let di=0;di<3;di++){const ph=globalTimer*2.2+di*0.65,oy=Math.sin(ph)*18,sc=0.72+0.28*(Math.sin(ph)*0.5+0.5),a=0.25+0.77*(Math.sin(ph)*0.5+0.5);ctx.globalAlpha=a;ctx.fillStyle=C_WHITE;ctx.font=`bold ${Math.round((isMobile?68:98)*sc)}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('•',dbx+di*dsp,dby+oy);}
  ctx.globalAlpha=0.47+0.53*(Math.sin(globalTimer*1.6)*0.5+0.5);ctx.fillStyle=C_DIM;ctx.font='15px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(isMobile?'Tap to begin':'Press SPACE to begin',W/2,H-56);
  ctx.restore();
}

function clearGlow(){glowStars=[];glowRings=[];glowSpawned.clear();glowTrickle=0;}
function clearDisplay(full){activeAnims=[];lastHash=null;starSpawned.clear();clearGlow();bottomNote=null;if(full){wordIndex=0;startIdx=0;isCleared=true;}}

function advanceDisplay(){
  activeAnims.forEach(a=>a.flashActive=false);bottomNote=null;
  if(wordIndex<textData.length){
    wordIndex++;if(textData[wordIndex-1][2]){startIdx=wordIndex-1;activeAnims=[];starSpawned.clear();clearGlow();}isCleared=false;
  }else{clearDisplay(true);}
}

function drawSig(){ctx.save();ctx.fillStyle='rgba(55,55,68,0.75)';ctx.font='11px Arial';ctx.textAlign='right';ctx.textBaseline='bottom';ctx.fillText('VinhOS 6.0 | 18T23426VH',W-12,H-6);ctx.restore();}

function frame(now){
  const dt=Math.min((now-lastTime)/1000,0.05);lastTime=now;flashTimer+=dt;globalTimer+=dt;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#0a0a0d';ctx.fillRect(0,0,W,H);

  if(state==='DISPLAY'){
    bgZoomTimer+=dt;const bgZoom=1+0.06*Math.sin(bgZoomTimer*Math.PI/12);
    drawBg('display',0.38,bgZoom);
  }else{drawBg('menu',0.42,1);}

  if(state==='MENU'){
    drawMenu();
  }else if(state==='INPUT'){
    drawInputState();
    particles=particles.filter(p=>{const ok=p.update(dt);if(ok)p.draw();return ok;});
  }else if(state==='DISPLAY'){
    const fo=Math.sin(flashTimer*FLASH_SPD*Math.PI*2)>0;
    const ff=activeAnims.some(a=>a.flash&&a.liss&&a.flashActive);
    if(ff&&fo){ctx.fillStyle='#f8f8f8';ctx.fillRect(0,0,W,H);drawBg('display',0.06,1);}
    if(isCleared){
      drawCleared();
    }else{
      const h=rehash();
      if(h!==lastHash){groupCounters={};calcLayout();lastHash=h;while(activeAnims.length>cData.length)activeAnims.pop();}
      let hasGlow=false;
      for(let i=0;i<cData.length;i++){
        const[word,tx,ty,col,liss,flash,star,burst,gid,note,glow]=cData[i];
        if(i<activeAnims.length){activeAnims[i].update(dt,tx,ty,cSize,fo);}
        else{
          let delay=0;if(gid>=0){if(!groupCounters[gid])groupCounters[gid]=0;delay=groupCounters[gid]*0.10;groupCounters[gid]++;}
          const a=new WordAnim(word,tx,ty,col,liss,flash,star,burst,glow,gid,note,i,delay);
          a.update(dt,tx,ty,cSize,fo);activeAnims.push(a);
          if(note&&(!bottomNote||bottomNote.text!==note))bottomNote=new BottomNote(note);
        }
        if(star&&!starSpawned.has(i)&&activeAnims[i].alpha>20){ctx.font=`bold ${cSize}px Arial`;spawnParticles(activeAnims[i].curX,activeAnims[i].curY,ctx.measureText(word).width*NEN,cSize*1.1,74);starSpawned.add(i);}
        if(glow){hasGlow=true;if(!glowSpawned.has(i)&&activeAnims[i].alpha>20){spawnGlow(activeAnims[i].curX,activeAnims[i].curY,col,20,4);glowSpawned.add(i);}}
      }
      if(hasGlow){glowTrickle+=dt;if(glowTrickle>=0.38){glowTrickle=0;glowStars.push(new GlowStar());}}else glowTrickle=0;
      particles=particles.filter(p=>{const ok=p.update(dt);if(ok)p.draw();return ok;});
      glowStars=glowStars.filter(s=>{const ok=s.update(dt);if(ok)s.draw();return ok;});
      glowRings=glowRings.filter(r=>{const ok=r.update(dt);if(ok)r.draw();return ok;});
      for(const a of activeAnims)a.draw(fo&&!ff);
      if(bottomNote){bottomNote.update(dt);bottomNote.draw();}
      if(isMobile){
        const bw=76,bh=42;drawBtn(14,H-bh-14,bw,bh,'Back','rgba(28,28,42,0.88)','#f5f5f8',14);
      }
    }
  }
  drawSig();
  requestAnimationFrame(frame);
}
requestAnimationFrame(t=>{lastTime=t;requestAnimationFrame(frame);});

function handlePointer(mx,my){
  if(state==='MENU'){
    const action=menuHitAt(mx,my);
    if(action==='START'){state='DISPLAY';clearDisplay(true);}
    else if(action==='EDIT'){state='INPUT';groupSel=[];if(isMobile)showMobileInput();}
    else if(action==='BACKGROUND')openBgPanel();
    else if(action==='SHARE')openSharePanel();
    else if(action==='FULLSCREEN')toggleFullscreen();
    return;
  }
  if(state==='DISPLAY'){
    if(isMobile){const bw=76,bh=42;if(mx>=14&&mx<=14+bw&&my>=H-bh-14&&my<=H-14){state='MENU';return;}}
    advanceDisplay();return;
  }
  if(state==='INPUT'){
    for(const{idx,rect:r}of effBtnRects()){
      if(hitRect(r,mx,my)&&editingIndex>=0){
        textData[editingIndex][idx]=!textData[editingIndex][idx];
        if(idx===4&&textData[editingIndex][4]){const wr=wordRects.find(w=>w.idx===editingIndex);if(wr)spawnParticles(wr.x+wr.w/2,wr.y+wr.h/2,wr.w,wr.h,58);}
        return;
      }
    }
    const gb=groupBtnRect();
    if(hitRect(gb,mx,my)){
      if(groupSel.length>=2){const gs=[...groupSel].sort((a,b)=>a-b);if(gs.every((v,i)=>i===0||v===gs[i-1]+1)){const gid=nextGid++;gs.forEach(i=>textData[i][6]=gid);}groupSel=[];}
      else if(editingIndex>=0)textData[editingIndex][6]=-1;
      return;
    }
    const nb=noteBtnRect();
    if(hitRect(nb,mx,my)&&editingIndex>=0){openNotePanel(editingIndex);return;}
    for(const{color,rect:r}of swatchRects()){if(hitRect(r,mx,my)){currentColor=color;if(editingIndex>=0)textData[editingIndex][1]=color;return;}}
    for(const wr of wordRects){
      if(hitRect(wr,mx,my)){
        if(isMobile){groupSel.includes(wr.idx)?groupSel=groupSel.filter(x=>x!==wr.idx):groupSel.push(wr.idx);}
        else{editingIndex=wr.idx;inputBuffer=textData[wr.idx][0];groupSel=[];}
        return;
      }
    }
    editingIndex=-1;inputBuffer='';
  }
}

canvas.addEventListener('click',e=>handlePointer(e.clientX,e.clientY));
canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];handlePointer(t.clientX,t.clientY);},{passive:false});

document.addEventListener('keydown',e=>{
  if(e.key==='Control'){ctrlDown=true;return;}
  const tag=document.activeElement.tagName;if(tag==='INPUT'||tag==='TEXTAREA')return;
  if(e.key==='Escape'){if(state!=='MENU'){state='MENU';editingIndex=-1;inputBuffer='';hideMobileInput();}return;}
  if(e.ctrlKey&&e.key.toLowerCase()==='a'){e.preventDefault();if(state==='INPUT'){textData=[];inputBuffer='';editingIndex=-1;groupSel=[];}else if(state==='DISPLAY'){startIdx=wordIndex;clearDisplay(false);isCleared=true;}return;}
  if(e.ctrlKey&&e.key.toLowerCase()==='v'){if(state==='INPUT')navigator.clipboard.readText().then(txt=>{if(editingIndex>=0)inputBuffer+=txt;else txt.trim().split(/\s+/).filter(Boolean).forEach(w=>textData.push([w,currentColor,false,false,false,false,-1,'',false]));}).catch(()=>{});return;}
  if(state==='INPUT'){
    if(e.key==='Backspace'){e.preventDefault();if(inputBuffer)inputBuffer=inputBuffer.slice(0,-1);else if(editingIndex<0&&textData.length)textData.pop();}
    else if(e.key===' '){e.preventDefault();confirmWord();}
    else if(e.key==='Enter'){e.preventDefault();if(inputBuffer.trim())confirmWord();state='MENU';}
  }else if(state==='DISPLAY'){
    if(e.key===' '){e.preventDefault();advanceDisplay();}
    else if(e.key==='Backspace'){e.preventDefault();clearDisplay(true);particles=[];}
  }
});
document.addEventListener('keypress',e=>{const tag=document.activeElement.tagName;if(tag==='INPUT'||tag==='TEXTAREA')return;if(state!=='INPUT'||e.ctrlKey||e.metaKey)return;if(e.key.length===1)inputBuffer+=e.key;});
document.addEventListener('keyup',e=>{if(e.key==='Control')ctrlDown=false;});

function confirmWord(){const w=inputBuffer.trim();if(!w)return;if(editingIndex>=0){textData[editingIndex][0]=w;editingIndex=-1;}else{textData.push([w,currentColor,false,false,false,false,-1,'',false]);}inputBuffer='';}

function showMobileInput(){document.getElementById('mobileInput').classList.add('show');setTimeout(()=>document.getElementById('mobileTextField').focus(),80);}
function hideMobileInput(){document.getElementById('mobileInput').classList.remove('show');document.getElementById('mobileTextField').blur();}

document.getElementById('mobConfirm').addEventListener('click',()=>{
  const v=document.getElementById('mobileTextField').value.trim();if(!v)return;
  if(editingIndex>=0){textData[editingIndex][0]=v;editingIndex=-1;}
  else{v.split(/\s+/).filter(Boolean).forEach(w=>textData.push([w,currentColor,false,false,false,false,-1,'',false]));}
  document.getElementById('mobileTextField').value='';document.getElementById('mobileTextField').focus();
});
document.getElementById('mobPaste').addEventListener('click',()=>{
  navigator.clipboard.readText().then(txt=>{if(!txt.trim())return;txt.trim().split(/\s+/).filter(Boolean).forEach(w=>textData.push([w,currentColor,false,false,false,false,-1,'',false]));}).catch(()=>{document.getElementById('mobileTextField').focus();});
});
document.getElementById('mobDone').addEventListener('click',()=>{
  const v=document.getElementById('mobileTextField').value.trim();
  if(v){v.split(/\s+/).filter(Boolean).forEach(w=>textData.push([w,currentColor,false,false,false,false,-1,'',false]));document.getElementById('mobileTextField').value='';}
  hideMobileInput();state='MENU';
});
document.getElementById('mobileTextField').addEventListener('keydown',e=>{if(e.key==='Enter'){document.getElementById('mobConfirm').click();e.preventDefault();}});

function openBgPanel(){document.getElementById('bgPanel').classList.remove('hidden');updateBgInfo();}
function closeBgPanel(){document.getElementById('bgPanel').classList.add('hidden');}
document.getElementById('bgBtnClose').addEventListener('click',closeBgPanel);
['Menu','Display','Both'].forEach(t=>{document.getElementById('bgBtn'+t).addEventListener('click',()=>{bgPickTarget=t.toLowerCase();updateBgTargetBtns();});});
document.getElementById('bgBtnLoad').addEventListener('click',()=>{const v=document.getElementById('bgPathInput').value.trim();if(v){loadBg(v,bgPickTarget);showBgMsg('Loaded!',true);}});
document.getElementById('bgBtnClear').addEventListener('click',()=>{clearBg(bgPickTarget);showBgMsg('Cleared',true);});
document.getElementById('bgBtnImport').addEventListener('click',()=>document.getElementById('bgFileInput').click());
document.getElementById('bgFileInput').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;loadBg(URL.createObjectURL(f),bgPickTarget);showBgMsg(`Loaded: ${f.name.slice(0,28)}`,true);});
function updateBgTargetBtns(){['menu','display','both'].forEach(t=>{const id='bgBtn'+t.charAt(0).toUpperCase()+t.slice(1),btn=document.getElementById(id);btn.style.background=t===bgPickTarget?'#559bff':'#3c3c4e';btn.style.color=t===bgPickTarget?'#0c0c0e':'#f5f5f8';});}
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(!f)return;loadBg(URL.createObjectURL(f),bgPickTarget);showBgMsg(`Loaded: ${f.name.slice(0,28)}`,true);});

function openNotePanel(idx){noteEditIdx=idx;document.getElementById('notePanelTitle').textContent=`Note: "${textData[idx][0]}"`;document.getElementById('noteInput').value=textData[idx][7]||'';document.getElementById('notePanel').classList.remove('hidden');setTimeout(()=>document.getElementById('noteInput').focus(),50);}
function closeNotePanel(){document.getElementById('notePanel').classList.add('hidden');noteEditIdx=-1;}
document.getElementById('noteSave').addEventListener('click',()=>{if(noteEditIdx>=0)textData[noteEditIdx][7]=document.getElementById('noteInput').value.trim();closeNotePanel();});
document.getElementById('noteClear').addEventListener('click',()=>{document.getElementById('noteInput').value='';});
document.getElementById('noteCancel').addEventListener('click',closeNotePanel);
document.getElementById('noteInput').addEventListener('keydown',e=>{if(e.ctrlKey&&e.key==='Enter'){if(noteEditIdx>=0)textData[noteEditIdx][7]=e.target.value.trim();closeNotePanel();}else if(e.key==='Escape')closeNotePanel();});

function serializeData(){try{return btoa(unescape(encodeURIComponent(JSON.stringify(textData))));}catch{return '';}}
function deserializeData(s){try{return JSON.parse(decodeURIComponent(escape(atob(s))));}catch{return null;}}

function openSharePanel(){
  if(!textData.length){showToast('No content to share');return;}
  const enc=serializeData();
  document.getElementById('shareLinkInput').value=`${location.origin}${location.pathname}?d=${enc}`;
  document.getElementById('shareMsg').textContent='';
  document.getElementById('sharePanel').classList.remove('hidden');
}
function closeSharePanel(){document.getElementById('sharePanel').classList.add('hidden');}
document.getElementById('shareClose').addEventListener('click',closeSharePanel);
document.getElementById('shareCopy').addEventListener('click',()=>{
  const v=document.getElementById('shareLinkInput').value;
  navigator.clipboard.writeText(v).then(()=>{document.getElementById('shareMsg').textContent='Copied!';showToast('Link copied!');}).catch(()=>{document.getElementById('shareLinkInput').select();document.execCommand('copy');document.getElementById('shareMsg').textContent='Copied!';});
});
document.getElementById('shareLinkInput').addEventListener('click',e=>e.target.select());

function showToast(msg){const el=document.getElementById('shareToast');el.textContent=msg;el.style.opacity='1';setTimeout(()=>el.style.opacity='0',2400);}
function toggleFullscreen(){if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{});else document.exitFullscreen().catch(()=>{});}

const urlParams=new URLSearchParams(location.search),sharedData=urlParams.get('d');
if(sharedData){const p=deserializeData(sharedData);if(p&&Array.isArray(p)&&p.length){textData=p;state='DISPLAY';clearDisplay(true);}}
</script>
</body>
</html>
