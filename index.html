<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>VinhOS 6.1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0d;touch-action:none}
canvas{display:block;position:fixed;top:0;left:0}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.72);display:flex;align-items:center;justify-content:center;z-index:50;padding:14px}
.overlay.hidden{display:none}
.panel{background:rgba(18,18,26,0.98);border:1px solid rgba(60,60,85,0.9);border-radius:16px;padding:20px;color:#f5f5f8;font-family:Arial,sans-serif;width:100%;max-width:500px;max-height:88vh;overflow-y:auto}
.panel h2{font-size:clamp(15px,4vw,19px);margin-bottom:12px}
.panel label{font-size:11px;color:#5f5f69;display:block;margin-bottom:5px}
input[type=text],textarea{width:100%;background:rgba(30,30,44,0.95);border:1.5px solid rgba(85,155,255,0.4);border-radius:8px;color:#f5f5f8;font-size:15px;padding:9px 12px;outline:none;font-family:Arial,sans-serif;-webkit-appearance:none}
input[type=text]:focus,textarea:focus{border-color:#559bff}
textarea{resize:none;height:76px}
.btn-row{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap}
button{border:none;border-radius:8px;padding:9px 15px;cursor:pointer;font-family:Arial,sans-serif;font-weight:bold;font-size:13px;transition:filter .12s;white-space:nowrap}
button:active{filter:brightness(.82)}
#mobileBar{position:fixed;bottom:0;left:0;width:100%;background:rgba(16,16,24,0.97);border-top:1px solid rgba(55,55,80,0.8);padding:9px 10px max(9px,env(safe-area-inset-bottom)) 10px;z-index:40;display:none;gap:7px;flex-wrap:wrap;align-items:center}
#mobileBar.show{display:flex}
#mobField{flex:1;min-width:100px;background:rgba(30,30,44,0.95);border:1.5px solid rgba(85,155,255,0.4);border-radius:8px;color:#f5f5f8;font-size:16px;padding:8px 11px;outline:none;font-family:Arial,sans-serif;-webkit-appearance:none}
#mobField:focus{border-color:#559bff}
.mb{background:rgba(50,50,68,0.95);color:#f5f5f8;border:none;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:bold;cursor:pointer;white-space:nowrap}
#toast{position:fixed;bottom:34px;left:50%;transform:translateX(-50%);background:rgba(18,18,26,.96);border:1px solid rgba(85,155,255,.5);color:#f5f5f8;padding:10px 20px;border-radius:9px;font-size:13px;z-index:60;opacity:0;transition:opacity .3s;pointer-events:none;font-family:Arial,sans-serif}
#ctxMenu{position:fixed;z-index:55;background:rgba(18,18,26,.98);border:1px solid rgba(60,60,85,.9);border-radius:12px;padding:8px;display:none;flex-direction:column;gap:5px;min-width:150px;font-family:Arial,sans-serif}
#ctxMenu.show{display:flex}
.ctx-item{padding:9px 14px;border-radius:7px;font-size:14px;font-weight:bold;cursor:pointer;color:#f5f5f8;background:transparent;border:none;text-align:left}
.ctx-item:hover,.ctx-item:active{background:rgba(85,155,255,.18)}
.ctx-item.danger{color:#eb6060}
.ctx-colors{display:flex;flex-wrap:wrap;gap:5px;padding:7px 10px}
.ctx-cc{width:26px;height:26px;border-radius:6px;cursor:pointer;border:2px solid transparent}
.ctx-cc.active{border-color:#fff}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="bgPanel" class="overlay hidden">
  <div class="panel">
    <h2>Background Settings</h2>
    <label>Image or video URL — or drag & drop a file</label>
    <input id="bgPathInput" type="text" placeholder="Paste URL…" style="margin-bottom:9px">
    <div style="display:flex;gap:7px;margin-bottom:9px;flex-wrap:wrap">
      <button id="bgBtnImport" style="background:#559bff;color:#0c0c0e">Import File</button>
      <button id="bgBtnMenu"    style="background:#3c3c4e;color:#f5f5f8">Menu</button>
      <button id="bgBtnDisplay" style="background:#3c3c4e;color:#f5f5f8">Display</button>
      <button id="bgBtnBoth"    style="background:#559bff;color:#0c0c0e">Both</button>
    </div>
    <div class="btn-row">
      <button id="bgBtnLoad"  style="background:#559bff;color:#0c0c0e">Load</button>
      <button id="bgBtnClear" style="background:#7a1e1e;color:#fff">Clear</button>
      <button id="bgBtnClose" style="background:#3c3c4e;color:#f5f5f8">Close</button>
    </div>
    <div id="bgMsg"  style="margin-top:9px;font-size:13px;min-height:15px"></div>
    <div id="bgInfo" style="margin-top:7px;font-size:11px;color:#5f5f69;line-height:1.6"></div>
    <input type="file" id="bgFileInput" accept="image/*,video/*" style="display:none">
  </div>
</div>

<div id="notePanel" class="overlay hidden">
  <div class="panel">
    <h2 id="notePanelTitle"></h2>
    <label>Shown at the bottom during presentation</label>
    <textarea id="noteInput" placeholder="Type note…"></textarea>
    <div class="btn-row">
      <button id="noteSave"   style="background:#2ea858;color:#fff">Save</button>
      <button id="noteClear"  style="background:#7a1e1e;color:#fff">Clear</button>
      <button id="noteCancel" style="background:#3c3c4e;color:#f5f5f8">Cancel</button>
    </div>
  </div>
</div>

<div id="sharePanel" class="overlay hidden">
  <div class="panel">
    <h2>Share Presentation</h2>
    <label>Anyone opening this link sees your slides directly</label>
    <input id="shareLinkInput" type="text" readonly style="margin-bottom:9px;cursor:pointer">
    <div class="btn-row">
      <button id="shareCopy"  style="background:#559bff;color:#0c0c0e">Copy Link</button>
      <button id="shareClose" style="background:#3c3c4e;color:#f5f5f8">Close</button>
    </div>
    <div id="shareMsg" style="margin-top:7px;font-size:13px;min-height:15px;color:#2ea858"></div>
  </div>
</div>

<div id="questionPanel" class="overlay hidden">
  <div class="panel">
    <h2>Question Feature</h2>
    <label>Text shown when YES is tapped</label>
    <textarea id="qYesText"   placeholder="Yes response…" style="margin-bottom:9px"></textarea>
    <label>Label for YES button</label>
    <input id="qYesLabel"  type="text" placeholder="Yes" style="margin-bottom:9px">
    <label>Label for NO button</label>
    <input id="qNoLabel"   type="text" placeholder="No"  style="margin-bottom:9px">
    <div class="btn-row">
      <button id="qSave"   style="background:#2ea858;color:#fff">Save</button>
      <button id="qRemove" style="background:#7a1e1e;color:#fff">Remove</button>
      <button id="qCancel" style="background:#3c3c4e;color:#f5f5f8">Cancel</button>
    </div>
  </div>
</div>

<div id="mobileBar">
  <input id="mobField" type="text" placeholder="Type word…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  <button class="mb" id="mobAdd">Add</button>
  <button class="mb" id="mobPaste">Paste</button>
  <button class="mb" id="mobClearAll" style="background:rgba(120,30,30,.9)">Clear All</button>
  <button class="mb" id="mobDone" style="background:rgba(85,155,255,.3)">Done</button>
</div>

<div id="ctxMenu">
  <div class="ctx-colors" id="ctxColors"></div>
  <button class="ctx-item" id="ctxEdit">Edit text</button>
  <button class="ctx-item" id="ctxNote">Note</button>
  <button class="ctx-item" id="ctxQuestion">Question</button>
  <div id="ctxEffects" style="display:flex;flex-wrap:wrap;gap:5px;padding:5px 8px"></div>
  <button class="ctx-item danger" id="ctxDelete">Delete word</button>
</div>

<div id="toast"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = window.innerWidth, H = window.innerHeight;
canvas.width = W; canvas.height = H;

const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || (window.matchMedia('(pointer:coarse)').matches && W < 1100);

window.addEventListener('resize', () => {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H; lastHash = null;
});

const LERP = 10.5, FLASH_SPD = 19, NEN = 0.89;
const C_WHITE = '#f5f5f8', C_DIM = '#5f5f69', C_ACC = '#559bff';
const C_GROUP = '#32e6b4', C_NOTE = '#ffc83c', C_GLOW = '#b478ff';
const COLORS = ['#f5f5f8','#ff5555','#55eb55','#4ba5ff','#ffff6e','#ff87eb','#a55fff','#ff9b4b','#00ffd2','#ff4baf','#9bff41','#d2d2e1'];
const MARGIN_W = isMobile ? 28 : 96, MARGIN_H = isMobile ? 44 : 84;

let state = 'MENU';
let textData = [];
let wordIndex = 0, startIdx = 0;
let activeAnims = [], lastHash = null;
let cSize = 20, cData = [], groupCounters = {};
let isCleared = true;
let editingIndex = -1, inputBuffer = '', currentColor = C_WHITE;
let flashTimer = 0, globalTimer = 0;
let starSpawned = new Set(), glowSpawned = new Set();
let glowTrickle = 0, bottomNote = null;
let groupSel = [], ctrlDown = false, nextGid = 0;
let bgPickTarget = 'both', noteEditIdx = -1, wordRects = [];
let particles = [], glowStars = [], glowRings = [];
let lastTime = performance.now(), bgZoomTimer = 0;

let questionData = { active: false, yesText: '', yesLabel: 'Yes', noLabel: 'No' };
let questionState = 'idle';
let questionNoWords = [];
let questionYesVisible = false;

let holdTimer = 0, holdTarget = -1, holdFired = false;
let ctxMenuIdx = -1;

const bgSrc = { menu: null, display: null };
const bgVid = { menu: null, display: null };
const bgPath = { menu: '', display: '' };

function newWord(w) {
  return [w, currentColor, false, false, false, false, -1, '', false];
}

function loadBg(src, target) {
  const isVid = /\.(mp4|webm|ogg|mov|avi)(\?|#|$)/i.test(src);
  const set = t => {
    if (isVid) {
      if (bgVid[t]) { bgVid[t].pause(); bgVid[t].src = ''; }
      const v = document.createElement('video');
      v.src = src; v.loop = true; v.muted = true; v.autoplay = true; v.playsInline = true;
      v.play().catch(() => {});
      bgVid[t] = v; bgSrc[t] = null; bgPath[t] = src;
    } else {
      if (bgVid[t]) { bgVid[t].pause(); bgVid[t].src = ''; bgVid[t] = null; }
      const img = new Image(); img.crossOrigin = 'anonymous';
      img.onload = () => { bgSrc[t] = img; };
      img.onerror = () => showBgMsg('Cannot load image', false);
      img.src = src; bgPath[t] = src;
    }
  };
  target === 'both' ? (set('menu'), set('display')) : set(target);
}

function clearBg(target) {
  const clr = t => { if (bgVid[t]) { bgVid[t].pause(); bgVid[t].src = ''; bgVid[t] = null; } bgSrc[t] = null; bgPath[t] = ''; };
  target === 'both' ? (clr('menu'), clr('display')) : clr(target);
}

function drawBg(which, dim, zoom) {
  const vid = bgVid[which], img = bgSrc[which], src = vid || img;
  if (!src) return;
  if (vid && (vid.readyState < 2 || !vid.videoWidth)) return;
  const sw = vid ? vid.videoWidth : img.naturalWidth;
  const sh = vid ? vid.videoHeight : img.naturalHeight;
  if (!sw || !sh) return;
  const scale = Math.max(W / sw, H / sh) * (zoom || 1);
  const nw = sw * scale, nh = sh * scale;
  ctx.save();
  ctx.drawImage(src, (W - nw) / 2, (H - nh) / 2, nw, nh);
  ctx.fillStyle = `rgba(0,0,0,${dim})`; ctx.fillRect(0, 0, W, H);
  ctx.restore();
}

function showBgMsg(txt, ok) {
  const el = document.getElementById('bgMsg'); el.textContent = txt; el.style.color = ok ? '#2ea858' : '#eb4141';
  document.getElementById('bgInfo').innerHTML = `Menu: ${bgPath.menu ? '...' + bgPath.menu.slice(-26) : '—'}<br>Display: ${bgPath.display ? '...' + bgPath.display.slice(-26) : '—'}`;
}

function updateBgInfo() { showBgMsg('', true); }

const P_PAL = [[255,225,70],[255,195,35],[195,165,25],[230,230,230],[170,215,255],[255,155,195],[155,255,195],[195,155,255],[255,255,115],[115,255,255]];
const P_SHP = ['star4','star6','diamond','dot','line'];

class Particle {
  constructor(cx, cy, sw, sh) {
    const a = Math.random()*Math.PI*2, s = 55+Math.random()*190;
    this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s-(35+Math.random()*75);
    this.x=cx+(Math.random()-.5)*sw; this.y=cy+(Math.random()-.5)*sh*.6;
    this.life=1; this.decay=.52+Math.random()*.73;
    this.size=3.5+Math.random()*7.5; this.rot=Math.random()*Math.PI*2;
    this.rotv=(Math.random()-.5)*14; this.grav=50+Math.random()*85;
    this.shape=P_SHP[Math.floor(Math.random()*P_SHP.length)];
    this.color=P_PAL[Math.floor(Math.random()*P_PAL.length)];
  }
  update(dt) { this.x+=this.vx*dt; this.y+=this.vy*dt; this.vy+=this.grav*dt; this.rot+=this.rotv*dt; this.life-=this.decay*dt; return this.life>0; }
  draw() {
    const r=Math.max(1,this.size*this.life),[R,G,B]=this.color;
    ctx.save(); ctx.globalAlpha=Math.max(0,this.life); ctx.translate(this.x,this.y); ctx.rotate(this.rot);
    ctx.fillStyle=ctx.strokeStyle=`rgb(${R},${G},${B})`;
    if(this.shape==='dot'){ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();}
    else if(this.shape==='line'){ctx.lineWidth=Math.max(1,r/3);ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(r,0);ctx.stroke();}
    else{const n=this.shape==='star6'?6:this.shape==='diamond'?2:4;ctx.beginPath();for(let i=0;i<n*2;i++){const ang=i*Math.PI/n,rad=i%2===0?r:r*.42;i===0?ctx.moveTo(Math.cos(ang)*rad,Math.sin(ang)*rad):ctx.lineTo(Math.cos(ang)*rad,Math.sin(ang)*rad);}ctx.closePath();ctx.fill();}
    ctx.restore();
  }
}

const GLOW_COLS = [[200,160,255],[255,200,80],[100,220,255],[255,140,200],[160,255,180],[255,255,180]];

class GlowStar {
  constructor() {
    const side=['left','right','top','bottom'][Math.floor(Math.random()*4)];
    if(side==='left'){this.x=-20;this.y=Math.random()*H;this.vx=35+Math.random()*60;this.vy=(Math.random()-.5)*40;}
    if(side==='right'){this.x=W+20;this.y=Math.random()*H;this.vx=-(35+Math.random()*60);this.vy=(Math.random()-.5)*40;}
    if(side==='top'){this.x=Math.random()*W;this.y=-20;this.vx=(Math.random()-.5)*40;this.vy=35+Math.random()*60;}
    if(side==='bottom'){this.x=Math.random()*W;this.y=H+20;this.vx=(Math.random()-.5)*40;this.vy=-(35+Math.random()*60);}
    this.size=4+Math.random()*9; this.rot=Math.random()*Math.PI*2;
    this.rotv=(Math.random()-.5)*4.4; this.pulse=Math.random()*Math.PI*2;
    this.color=GLOW_COLS[Math.floor(Math.random()*GLOW_COLS.length)]; this.alive=true;
  }
  kill(){this.alive=false;}
  update(dt){if(!this.alive)return false;this.x+=this.vx*dt;this.y+=this.vy*dt;this.rot+=this.rotv*dt;this.pulse+=3.8*dt;return this.x>-80&&this.x<W+80&&this.y>-80&&this.y<H+80;}
  draw(){
    const pv=.78+.22*Math.sin(this.pulse),r=Math.max(2,this.size*pv),a=Math.min(1,.82*pv),[R,G,B]=this.color;
    ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.rot);
    const g=ctx.createRadialGradient(0,0,0,0,0,r*3);
    g.addColorStop(0,`rgba(${R},${G},${B},${a*.5})`);g.addColorStop(.4,`rgba(${R},${G},${B},${a*.18})`);g.addColorStop(1,`rgba(${R},${G},${B},0)`);
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,r*3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(${R},${G},${B},${a})`;ctx.beginPath();
    for(let i=0;i<8;i++){const ang=i*Math.PI/4,rad=i%2===0?r:r*.38;i===0?ctx.moveTo(Math.cos(ang)*rad,Math.sin(ang)*rad):ctx.lineTo(Math.cos(ang)*rad,Math.sin(ang)*rad);}
    ctx.closePath();ctx.fill();
    ctx.fillStyle=`rgba(255,255,255,${a*.55})`;ctx.beginPath();
    for(let i=0;i<8;i++){const ang=i*Math.PI/4+Math.PI/4,rad=i%2===0?r*.45:r*.17;i===0?ctx.moveTo(Math.cos(ang)*rad,Math.sin(ang)*rad):ctx.lineTo(Math.cos(ang)*rad,Math.sin(ang)*rad);}
    ctx.closePath();ctx.fill();ctx.restore();
  }
}

class GlowRing {
  constructor(cx,cy,color){this.x=cx;this.y=cy;this.r=0;this.maxR=60+Math.random()*100;this.life=1;this.decay=.4+Math.random()*.5;this.speed=80+Math.random()*100;this.color=color;}
  update(dt){this.r+=this.speed*dt;this.life-=this.decay*dt;return this.life>0&&this.r<this.maxR*1.2;}
  draw(){if(this.r<2)return;ctx.save();ctx.globalAlpha=Math.max(0,this.life*.62);ctx.strokeStyle=this.color;ctx.lineWidth=Math.max(1,3*this.life);ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.stroke();ctx.restore();}
}

function spawnParticles(cx,cy,sw,sh,n=68){for(let i=0;i<n;i++)particles.push(new Particle(cx,cy,sw,sh));}
function spawnGlow(cx,cy,color,ns=20,nr=4){for(let i=0;i<ns;i++)glowStars.push(new GlowStar());for(let i=0;i<nr;i++)glowRings.push(new GlowRing(cx,cy,color));}

class BurstChar {
  constructor(ch,cx,cy,color,size){
    this.ch=ch;this.color=color;this.size=size;this.x=cx;this.y=cy;
    const a=Math.random()*Math.PI*2,s=310+Math.random()*370;
    this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s;
    this.rot=Math.random()*Math.PI*2;this.rotv=(Math.random()-.5)*56;
    this.life=1;this.decay=.48+Math.random()*.44;
  }
  update(dt){this.x+=this.vx*dt;this.y+=this.vy*dt;const d=this.life>.65?6.8:2.4;this.vx*=1-d*dt;this.vy*=1-d*dt;this.vy+=48*dt;this.rot+=this.rotv*dt;this.rotv*=.91;this.life-=this.decay*dt;return this.life>0;}
  draw(m){ctx.save();ctx.globalAlpha=Math.max(0,(m/255)*this.life);ctx.font=`bold ${this.size}px Arial`;ctx.fillStyle=this.color;ctx.textAlign='center';ctx.textBaseline='middle';ctx.translate(this.x,this.y);ctx.rotate(this.rot);ctx.scale(NEN,1);ctx.fillText(this.ch,0,0);ctx.restore();}
}

class WordAnim {
  constructor(word,sx,sy,color,liss,flash,star,burst,glow,gid,note,idx,delay){
    this.word=word;this.color=color;this.liss=liss;this.flash=flash;this.star=star;this.burst=burst;this.glow=glow;
    this.gid=gid;this.note=note;this.wordIdx=idx;this.groupDelay=delay;
    this.curX=sx;this.curY=sy+80;this.curSize=5;this.alpha=0;
    this.timer=Math.random()*5;this.flashActive=flash;
    this.burstChars=[];this.burstBuilt=false;this.burstTimer=0;
    this.groupRevealed=gid<0;this.groupTimer=0;
  }
  _buildBurst(size){
    this.burstChars=[];ctx.font=`bold ${size}px Arial`;
    const tw=ctx.measureText(this.word).width*NEN;let x=this.curX-tw/2;
    for(const ch of this.word){if(!ch.trim())continue;const cw=ctx.measureText(ch).width*NEN;this.burstChars.push(new BurstChar(ch,x+cw/2,this.curY,this.color,size));x+=cw;}
  }
  update(dt,tx,ty,ts,fo){
    this.timer+=dt;
    if(this.gid>=0&&!this.groupRevealed){this.groupTimer+=dt;if(this.groupTimer>=this.groupDelay)this.groupRevealed=true;else{this.curX=tx;this.curY=ty;return;}}
    let fx=tx,fy=ty;
    if(this.liss){fx+=Math.cos(this.timer*1.5)*12;fy+=Math.sin(this.timer*3)*8;}
    this.curX+=(fx-this.curX)*LERP*dt;this.curY+=(fy-this.curY)*LERP*dt;
    this.curSize+=(ts-this.curSize)*LERP*dt;this.alpha+=(255-this.alpha)*LERP*dt;
    if(this.burst){
      this.burstTimer+=dt;
      if(!this.burstBuilt&&this.burstTimer>=1.35){this.burstBuilt=true;this._buildBurst(Math.round(this.curSize));}
      if(this.burstBuilt){this.burstChars=this.burstChars.filter(c=>c.update(dt));this.alpha=Math.max(30,this.alpha-420*dt);}
    }
  }
  getColor(fo){
    if(this.liss){const c=(Math.sin(this.timer*.8)+1)/2;return`rgb(${Math.round(100+100*c)},${Math.round(150+105*(1-c))},255)`;}
    if(this.flash&&this.flashActive&&fo)return'#0a0a0a';
    return this.color;
  }
  draw(fo){
    if(!this.groupRevealed||this.alpha<2)return;
    if(this.burst&&this.burstBuilt){this.burstChars.forEach(c=>c.draw(this.alpha));return;}
    const a=Math.min(1,this.alpha/255),s=Math.round(this.curSize);if(s<2)return;
    ctx.save();ctx.globalAlpha=a;ctx.font=`bold ${s}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';
    const col=this.getColor(fo);
    if(this.glow){
      const tw=ctx.measureText(this.word).width*NEN,pulse=.5+.5*Math.sin(this.timer*3.2),ga=(.12+.10*pulse)*a;
      const gr=ctx.createRadialGradient(this.curX,this.curY,0,this.curX,this.curY,tw*.7+s*.5);
      gr.addColorStop(0,`rgba(180,120,255,${ga*1.8})`);gr.addColorStop(.5,`rgba(180,120,255,${ga})`);gr.addColorStop(1,'rgba(180,120,255,0)');
      const pad=s*.14;ctx.fillStyle=gr;ctx.fillRect(this.curX-tw/2-pad*3,this.curY-s*.6-pad*2,tw+pad*6,s*1.2+pad*4);

class BottomNote {
  constructor(text){this.text=text;this.alpha=0;this.curY=H+40;this.targetY=H-(isMobile?54:68);this.timer=0;}
  update(dt){this.timer+=dt;this.alpha=Math.min(255,this.alpha+380*dt);this.curY+=(this.targetY-this.curY)*11*dt;}
  draw(){
    if(this.alpha<2)return;
    const a=this.alpha/255,fs=isMobile?14:19;ctx.font=`${fs}px Arial`;
    const maxW=Math.min(isMobile?W-44:680,W-44),words=this.text.split(' '),lines=[];let cur='';
    for(const w of words){const t=cur?cur+' '+w:w;if(ctx.measureText(t).width>maxW){if(cur)lines.push(cur);cur=w;}else cur=t;}
    if(cur)lines.push(cur);
    const lh=fs+5,pad=12,tw=Math.max(...lines.map(l=>ctx.measureText(l).width));
    const bw=tw+pad*2,bh=lh*lines.length+pad*2,bx=W/2-bw/2,by=this.curY-bh/2,pulse=Math.sin(this.timer*2.8)*.5+.5;
    ctx.save();
    ctx.globalAlpha=a*.42;ctx.fillStyle='#000';ctx.shadowColor='#000';ctx.shadowBlur=13;ctx.beginPath();ctx.roundRect(bx-5,by-5,bw+10,bh+10,12);ctx.fill();
    ctx.shadowBlur=0;ctx.globalAlpha=a*.88;ctx.fillStyle='rgba(15,14,24,.92)';ctx.beginPath();ctx.roundRect(bx,by,bw,bh,10);ctx.fill();
    ctx.globalAlpha=(.62+.24*pulse)*a;ctx.strokeStyle=C_NOTE;ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(bx,by,bw,bh,10);ctx.stroke();
    ctx.globalAlpha=a;ctx.fillStyle=C_NOTE;ctx.textAlign='center';ctx.textBaseline='middle';ctx.font=`${fs}px Arial`;
    lines.forEach((l,i)=>ctx.fillText(l,W/2,by+pad+i*lh+lh/2-2));
    ctx.restore();

}

function calcLayout(){
  const list=textData.slice(startIdx,wordIndex);
  if(!list.length){cData=[];return;}
  const areaW=W-MARGIN_W*2,areaH=H-MARGIN_H*2;
  let size=isMobile?180:280;
  while(size>8){
    ctx.font=`bold ${size}px Arial`;const spW=ctx.measureText(' ').width*NEN;
    let lines=[],curLine=[],curW=0,fits=true;
    for(const wd of list){
      const ww=ctx.measureText(wd[0]).width*NEN;if(ww>areaW){fits=false;break;}
      const pg=curLine.length?curLine[curLine.length-1][6]:-1,gap=pg>=0&&pg===wd[6]?0:spW;
      if(curW+gap+ww<=areaW){curLine.push([...wd,ww]);curW+=gap+ww;}else{lines.push(curLine);curLine=[[...wd,ww]];curW=ww;}
    }
    if(!fits){size-=4;continue;}
    if(curLine.length)lines.push(curLine);
    const lh=size*1.22,th=lines.length*lh;
    if(th<=areaH){
      const pos=[],sy=(H-th)/2;
      for(let ri=0;ri<lines.length;ri++){
        const row=lines[ri];let rw=0;
        for(let j=0;j<row.length;j++){const pg=j>0?row[j-1][6]:-1;rw+=row[j][row[j].length-1]+(j>0&&pg>=0&&pg===row[j][6]?0:j>0?spW:0);}
        let xo=(W-rw)/2;
        for(let j=0;j<row.length;j++){
          const it=row[j],ww=it[it.length-1];
          pos.push([it[0],xo+ww/2,sy+ri*lh+lh/2,it[1],it[2],it[3],it[4],it[5],it[6],it[7],it[8]]);
          const ng=j+1<row.length?row[j+1][6]:-1;xo+=ww+(ng>=0&&ng===it[6]?0:spW);
        }
      }
      cSize=size;cData=pos;return;
    }
    size-=4;
  }
  cSize=8;cData=[];
}

function rehash(){return textData.slice(startIdx,wordIndex).map(r=>r.join(',')).join('|');}

const SW=isMobile?32:40,SH=isMobile?32:40,SX0=12,SY0=12,SCOLS=6;
const EBW=isMobile?88:112,EBH=isMobile?34:40;
const EFF_DEFS=[{label:'WAVE',color:'#00e1a5',idx:2},{label:'FLASH',color:'#ffd71e',idx:3},{label:'STAR',color:'#ffa028',idx:4},{label:'BURST',color:'#ff55b9',idx:5},{label:'GLOW',color:C_GLOW,idx:8}];
function EBX(){return W-EBW-(isMobile?8:16);}
function effBtnRects(){return EFF_DEFS.map((e,i)=>({...e,rect:{x:EBX(),y:12+i*(EBH+6),w:EBW,h:EBH}}));}
function groupBtnRect(){return{x:EBX(),y:12+EFF_DEFS.length*(EBH+6),w:EBW,h:EBH};}
function noteBtnRect(){return{x:EBX(),y:12+EFF_DEFS.length*(EBH+6)+EBH+6,w:EBW,h:EBH};}
function questionBtnRect(){return{x:EBX(),y:12+EFF_DEFS.length*(EBH+6)+(EBH+6)*2,w:EBW,h:EBH};}
function swatchRects(){return COLORS.map((c,i)=>({color:c,rect:{x:SX0+(i%SCOLS)*(SW+5),y:SY0+Math.floor(i/SCOLS)*(SH+5),w:SW,h:SH}}));}
function boxRect(){
  const swBot=SY0+2*(SH+5)+5;
  const extraBottom=isMobile?72:42;
  return{x:12,y:swBot+9,w:W-EBW-(isMobile?26:40),h:H-swBot-extraBottom-18};
}
function hitRect(r,mx,my){return mx>=r.x&&mx<=r.x+r.w&&my>=r.y&&my<=r.y+r.h;}
function drawRR(x,y,w,h,r,fill,stroke,lw){ctx.beginPath();ctx.roundRect(x,y,w,h,r);if(fill){ctx.fillStyle=fill;ctx.fill();}if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw||1;ctx.stroke();}}
function drawBtn(x,y,w,h,label,bg,fg,fs){ctx.save();drawRR(x,y,w,h,8,bg);ctx.fillStyle=fg||'#f5f5f8';ctx.font=`bold ${fs||13}px Arial`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label,x+w/2,y+h/2);ctx.restore();}

function drawInputState(){

  });

  const gb=groupBtnRect(),gA=editingIndex>=0&&textData[editingIndex]&&textData[editingIndex][6]>=0,gH=groupSel.length>=2;

  const bx=boxRect();
  ctx.save();ctx.globalAlpha=.75;drawRR(bx.x,bx.y,bx.w,bx.h,10,'rgba(18,18,26,.92)');ctx.globalAlpha=1;ctx.strokeStyle='#222232';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(bx.x,bx.y,bx.w,bx.h,10);ctx.stroke();ctx.restore();

  const fs=Math.max(isMobile?18:22,Math.floor(bx.h/(isMobile?22:26)));
  ctx.font=`bold ${fs}px Arial`;const spW=ctx.measureText(' ').width*NEN,lh=fs*1.3,maxBW=bx.w-26;
  let lines=[],curLine=[],curX=0;
  const all=textData.map((wd,i)=>{const d=i===editingIndex?inputBuffer:wd[0],c=i===editingIndex?currentColor:wd[1];return{d,c,ww:ctx.measureText(d).width*NEN,i,liss:wd[2],fl:wd[3],st:wd[4],bu:wd[5],gid:wd[6],note:wd[7],glow:wd[8]};});
  if(editingIndex<0&&inputBuffer){const ww=ctx.measureText(inputBuffer).width*NEN;all.push({d:inputBuffer,c:currentColor,ww,i:-1,liss:false,fl:false,st:false,bu:false,gid:-1,note:'',glow:false});}
  for(const wd of all){const pg=curLine.length?curLine[curLine.length-1].gid:-1,gap=pg>=0&&pg===wd.gid?0:spW;if(curX+gap+wd.ww>maxBW){lines.push(curLine);curLine=[wd];curX=wd.ww;}else{curLine.push(wd);curX+=gap+wd.ww;}}

      if(wd.i>=0)wordRects.push({x:dx,y:dy,w:wd.ww,h:lh,idx:wd.i});
      if(wd.i===editingIndex){ctx.save();ctx.globalAlpha=.35;drawRR(dx-5,dy-2,wd.ww+10,lh+4,7,'rgba(85,115,195,.8)');ctx.restore();}
      if(groupSel.includes(wd.i)){ctx.save();ctx.globalAlpha=.25;drawRR(dx-5,dy-2,wd.ww+10,lh+4,7,C_GROUP);ctx.globalAlpha=.7;ctx.strokeStyle=C_GROUP;ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(dx-5,dy-2,wd.ww+10,lh+4,7);ctx.stroke();ctx.restore();}
      if(wd.gid>=0){ctx.save();ctx.globalAlpha=.4;ctx.fillStyle=C_GROUP;ctx.fillRect(dx-2,dy+lh-3,wd.ww+4,3);ctx.restore();}
      let dotX=dx+wd.ww+4;
      for(const[flag,col]of[[wd.liss,'#00e1a5'],[wd.fl,'#ffd71e'],[wd.st,'#ffa028'],[wd.bu,'#ff55b9'],[wd.glow,C_GLOW],[wd.gid>=0,C_GROUP],[!!wd.note,C_NOTE]]){if(flag){ctx.save();ctx.fillStyle=col;ctx.beginPath();ctx.arc(dotX,dy+lh/2,3,0,Math.PI*2);ctx.fill();ctx.restore();dotX+=8;}}

      if(!isMobile&&wd.i>=0){
        const editBtnW=34,editBtnH=22,editBtnX=dx+wd.ww+dotX-dx-dx+dx+wd.ww+8,editBtnY=dy+(lh-editBtnH)/2;
        void editBtnX;
      }
      ctx.save();ctx.font=`bold ${fs}px Arial`;ctx.fillStyle=wd.c;ctx.textAlign='left';ctx.textBaseline='top';ctx.scale(NEN,1);ctx.fillText(wd.d,dx/NEN,dy+2);ctx.restore();
      dx+=wd.ww;
    }
  }
  ctx.restore();

  if(Math.floor(globalTimer*2)%2===0){
    let cx2,cy2;
    if(wordRects.length){const lr=wordRects[wordRects.length-1];cx2=lr.x+lr.w+4;cy2=lr.y+4;}else{cx2=bx.x+14;cy2=bx.y+12;}
    ctx.fillStyle=C_ACC;ctx.fillRect(cx2,cy2,2,lh-7);

    let hx=12;for(const h of['SPACE=add','ENTER=done','BKSP=delete','Ctrl+A=clear','Click=edit']){const tw=ctx.measureText(h).width;if(hx+tw<W-EBW-24){ctx.fillText(h,hx,H-24);hx+=tw+13;}}

function clearGlow(){glowStars=[];glowRings=[];glowSpawned.clear();glowTrickle=0;}
function clearDisplay(full){activeAnims=[];lastHash=null;starSpawned.clear();clearGlow();bottomNote=null;if(full){wordIndex=0;startIdx=0;isCleared=true;}}

function advanceDisplay(){
  if(questionState==='question'){return;}
  if(questionState==='yesResult'){questionState='idle';clearDisplay(true);return;}
  activeAnims.forEach(a=>a.flashActive=false);bottomNote=null;
  if(wordIndex<textData.length){
    wordIndex++;
    if(textData[wordIndex-1][2]){startIdx=wordIndex-1;activeAnims=[];starSpawned.clear();clearGlow();}
    isCleared=false;
  }else{
    if(questionData.active){questionState='question';}else{clearDisplay(true);}
  }
}

function handleQuestionTap(mx,my){
  const btnW=isMobile?Math.min(W*.42,180):220,btnH=isMobile?54:66,gap=isMobile?18:28;
  const totalW=btnW*2+gap,bx=W/2-totalW/2,by=H*.65;
  if(mx>=bx&&mx<=bx+btnW&&my>=by&&my<=by+btnH){
    questionState='yesResult';questionYesVisible=true;return;
  }
  if(questionNoWords.length===0&&mx>=bx+btnW+gap&&mx<=bx+btnW*2+gap&&my>=by&&my<=by+btnH){
    const cx=bx+btnW+gap+btnW/2,cy=by+btnH/2;
    for(let i=0;i<8;i++){questionNoWords.push({x:cx,y:cy,vx:(Math.random()-.5)*400,vy:-(200+Math.random()*300),rot:Math.random()*Math.PI*2,rotv:(Math.random()-.5)*8,life:1});}
  }
}

function drawSig(){ctx.save();ctx.fillStyle='rgba(55,55,68,.7)';ctx.font='11px Arial';ctx.textAlign='right';ctx.textBaseline='bottom';ctx.fillText('VinhOS 6.1 | 18T23426VH',W-11,H-5);ctx.restore();}

function frame(now){
  const dt=Math.min((now-lastTime)/1000,.05);lastTime=now;flashTimer+=dt;globalTimer+=dt;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#0a0a0d';ctx.fillRect(0,0,W,H);

  if(state==='DISPLAY'||questionState!=='idle'){
    bgZoomTimer+=dt;const bgZoom=1+.06*Math.sin(bgZoomTimer*Math.PI/12);
    drawBg('display',.38,bgZoom);
  }else{drawBg('menu',.42,1);}

  if(state==='MENU'){
    drawMenu();
  }else if(state==='INPUT'){
    drawInputState();
    particles=particles.filter(p=>{const ok=p.update(dt);if(ok)p.draw();return ok;});
  }else if(state==='DISPLAY'){
    if(questionState==='question'){
      questionNoWords=questionNoWords.filter(nw=>{nw.x+=nw.vx*dt;nw.y+=nw.vy*dt;nw.vy+=300*dt;nw.rot+=nw.rotv*dt;nw.life-=.8*dt;return nw.life>0;});
      drawQuestionScreen();
    }else if(questionState==='yesResult'){
      drawYesResult();
    }else{
      const fo=Math.sin(flashTimer*FLASH_SPD*Math.PI*2)>0;
      const ff=activeAnims.some(a=>a.flash&&a.liss&&a.flashActive);
      if(ff&&fo){ctx.fillStyle='#f8f8f8';ctx.fillRect(0,0,W,H);drawBg('display',.06,1);}
      if(isCleared){drawCleared();}
      else{
        const h=rehash();
        if(h!==lastHash){groupCounters={};calcLayout();lastHash=h;while(activeAnims.length>cData.length)activeAnims.pop();}
        let hasGlow=false;
        for(let i=0;i<cData.length;i++){
          const[word,tx,ty,col,liss,flash,star,burst,gid,note,glow]=cData[i];
          if(i<activeAnims.length){activeAnims[i].update(dt,tx,ty,cSize,fo);}
          else{
            let delay=0;if(gid>=0){if(!groupCounters[gid])groupCounters[gid]=0;delay=groupCounters[gid]*.10;groupCounters[gid]++;}
            const a=new WordAnim(word,tx,ty,col,liss,flash,star,burst,glow,gid,note,i,delay);
            a.update(dt,tx,ty,cSize,fo);activeAnims.push(a);
            if(note&&(!bottomNote||bottomNote.text!==note))bottomNote=new BottomNote(note);
          }
          if(star&&!starSpawned.has(i)&&activeAnims[i].alpha>20){ctx.font=`bold ${cSize}px Arial`;spawnParticles(activeAnims[i].curX,activeAnims[i].curY,ctx.measureText(word).width*NEN,cSize*1.1,74);starSpawned.add(i);}
          if(glow){hasGlow=true;if(!glowSpawned.has(i)&&activeAnims[i].alpha>20){spawnGlow(activeAnims[i].curX,activeAnims[i].curY,col,20,4);glowSpawned.add(i);}}
        }
        if(hasGlow){glowTrickle+=dt;if(glowTrickle>=.38){glowTrickle=0;glowStars.push(new GlowStar());}}else glowTrickle=0;
        particles=particles.filter(p=>{const ok=p.update(dt);if(ok)p.draw();return ok;});
        glowStars=glowStars.filter(s=>{const ok=s.update(dt);if(ok)s.draw();return ok;});
        glowRings=glowRings.filter(r=>{const ok=r.update(dt);if(ok)r.draw();return ok;});
        for(const a of activeAnims)a.draw(fo&&!ff);
        if(bottomNote){bottomNote.update(dt);bottomNote.draw();}
      }
    }
    drawBackBtn();
  }
  drawSig();
  requestAnimationFrame(frame);
}
requestAnimationFrame(t=>{lastTime=t;requestAnimationFrame(frame);});

function handlePointer(mx,my){
  if(state==='MENU'){
    const action=menuHitAt(mx,my);
    if(action==='START'){state='DISPLAY';clearDisplay(true);}
    else if(action==='EDIT'){state='INPUT';groupSel=[];if(isMobile)showMobileBar();}
    else if(action==='BACKGROUND')openBgPanel();
    else if(action==='SHARE')openSharePanel();
    else if(action==='FULLSCREEN')toggleFullscreen();
    return;
  }
  if(state==='DISPLAY'){
    if(questionState==='question'){handleQuestionTap(mx,my);return;}
    if(questionState==='yesResult'){questionState='idle';clearDisplay(true);return;}
    if(isMobile){const bw=70,bh=38;if(mx>=12&&mx<=12+bw&&my>=H-bh-12&&my<=H-12){goBack();return;}}
    advanceDisplay();return;
  }
  if(state==='INPUT'){
    if(isMobile){const bh=36;if(mx>=12&&mx<=102&&my>=H-bh-8&&my<=H-8){textData=[];inputBuffer='';editingIndex=-1;groupSel=[];return;}}
    if(!isMobile){
      for(const{idx,rect:r}of effBtnRects()){
        if(hitRect(r,mx,my)&&editingIndex>=0){
          textData[editingIndex][idx]=!textData[editingIndex][idx];
          if(idx===4&&textData[editingIndex][4]){const wr=wordRects.find(w=>w.idx===editingIndex);if(wr)spawnParticles(wr.x+wr.w/2,wr.y+wr.h/2,wr.w,wr.h,58);}
          return;
        }
      }
      const gb=groupBtnRect();
      if(hitRect(gb,mx,my)){
        if(groupSel.length>=2){const gs=[...groupSel].sort((a,b)=>a-b);if(gs.every((v,i)=>i===0||v===gs[i-1]+1)){const gid=nextGid++;gs.forEach(i=>textData[i][6]=gid);}groupSel=[];}
        else if(editingIndex>=0)textData[editingIndex][6]=-1;
        return;
      }
      const nb=noteBtnRect();if(hitRect(nb,mx,my)&&editingIndex>=0){openNotePanel(editingIndex);return;}
      const qb=questionBtnRect();if(hitRect(qb,mx,my)){openQuestionPanel();return;}
    }
    for(const{color,rect:r}of swatchRects()){if(hitRect(r,mx,my)){currentColor=color;if(editingIndex>=0)textData[editingIndex][1]=color;return;}}
    if(!isMobile){
      for(const wr of wordRects){if(hitRect(wr,mx,my)){editingIndex=wr.idx;inputBuffer=textData[wr.idx][0];groupSel=[];return;}}
      editingIndex=-1;inputBuffer='';
    }
  }
}

function goBack(){
  if(state==='DISPLAY'){questionState='idle';state='MENU';}
  else if(state==='INPUT'){hideMobileBar();state='MENU';}
}

let holdInterval = null;
function startHold(mx,my){
  holdTimer=0;holdFired=false;holdTarget=-1;
  for(const wr of wordRects){if(hitRect(wr,mx,my)){holdTarget=wr.idx;break;}}
  if(holdTarget<0)return;
  holdInterval=setTimeout(()=>{holdFired=true;openCtxMenu(holdTarget,mx,my);},480);
}
function endHold(){clearTimeout(holdInterval);holdInterval=null;}

function openCtxMenu(idx,mx,my){
  ctxMenuIdx=idx;
  const el=document.getElementById('ctxMenu');
  const colors=document.getElementById('ctxColors');
  colors.innerHTML='';
  COLORS.forEach(c=>{const d=document.createElement('div');d.className='ctx-cc'+(textData[idx][1]===c?' active':'');d.style.background=c;d.addEventListener('click',()=>{textData[idx][1]=c;currentColor=c;closeCtxMenu();});colors.appendChild(d);});
  const effs=document.getElementById('ctxEffects');
  effs.innerHTML='';
  EFF_DEFS.forEach(({label,color,idx:eidx})=>{const b=document.createElement('button');b.style.cssText=`background:${textData[idx][eidx]?color:'#3c3c4e'};color:${textData[idx][eidx]?'#0c0c0e':'#f5f5f8'};border:none;border-radius:7px;padding:6px 10px;font-size:12px;font-weight:bold;cursor:pointer;`;b.textContent=label;b.addEventListener('click',()=>{textData[idx][eidx]=!textData[idx][eidx];b.style.background=textData[idx][eidx]?color:'#3c3c4e';b.style.color=textData[idx][eidx]?'#0c0c0e':'#f5f5f8';});effs.appendChild(b);});
  el.style.left=Math.min(mx,W-170)+'px';
  el.style.top=Math.min(my-10,H-320)+'px';
  el.classList.add('show');
}

function closeCtxMenu(){document.getElementById('ctxMenu').classList.remove('show');ctxMenuIdx=-1;}

document.getElementById('ctxEdit').addEventListener('click',()=>{if(ctxMenuIdx<0)return;const idx=ctxMenuIdx;closeCtxMenu();editingIndex=idx;document.getElementById('mobField').value=textData[idx][0];showMobileBar();setTimeout(()=>document.getElementById('mobField').focus(),80);});
document.getElementById('ctxNote').addEventListener('click',()=>{if(ctxMenuIdx<0)return;openNotePanel(ctxMenuIdx);closeCtxMenu();});
document.getElementById('ctxQuestion').addEventListener('click',()=>{openQuestionPanel();closeCtxMenu();});
document.getElementById('ctxDelete').addEventListener('click',()=>{if(ctxMenuIdx<0)return;textData.splice(ctxMenuIdx,1);if(editingIndex===ctxMenuIdx)editingIndex=-1;else if(editingIndex>ctxMenuIdx)editingIndex--;closeCtxMenu();});
document.addEventListener('click',e=>{const cm=document.getElementById('ctxMenu');if(cm.classList.contains('show')&&!cm.contains(e.target)){closeCtxMenu();}});

canvas.addEventListener('click', e => {
  if (document.getElementById('ctxMenu').classList.contains('show')) { closeCtxMenu(); return; }
  handlePointer(e.clientX, e.clientY);
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  if (state === 'INPUT' && isMobile) startHold(t.clientX, t.clientY);
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  endHold();
  if (!holdFired) handlePointer(t.clientX, t.clientY);
}, { passive: false });

canvas.addEventListener('touchmove', e => { e.preventDefault(); endHold(); }, { passive: false });

document.addEventListener('keydown', e => {
  if(e.key==='Control'){ctrlDown=true;return;}
  const tag=document.activeElement.tagName;if(tag==='INPUT'||tag==='TEXTAREA')return;
  if(e.key==='Escape'){if(state!=='MENU'){goBack();}return;}
  if(e.ctrlKey&&e.key.toLowerCase()==='a'){e.preventDefault();if(state==='INPUT'){textData=[];inputBuffer='';editingIndex=-1;groupSel=[];}else if(state==='DISPLAY'){startIdx=wordIndex;clearDisplay(false);isCleared=true;}return;}
  if(e.ctrlKey&&e.key.toLowerCase()==='v'){if(state==='INPUT')navigator.clipboard.readText().then(txt=>{if(editingIndex>=0)inputBuffer+=txt;else txt.trim().split(/\s+/).filter(Boolean).forEach(w=>textData.push(newWord(w)));}).catch(()=>{});return;}
  if(state==='INPUT'){
    if(e.key==='Backspace'){e.preventDefault();if(inputBuffer)inputBuffer=inputBuffer.slice(0,-1);else if(editingIndex<0&&textData.length)textData.pop();}
    else if(e.key===' '){e.preventDefault();confirmWord();}
    else if(e.key==='Enter'){e.preventDefault();if(inputBuffer.trim())confirmWord();state='MENU';}
  }else if(state==='DISPLAY'){
    if(e.key===' '){e.preventDefault();advanceDisplay();}
    else if(e.key==='Backspace'){e.preventDefault();clearDisplay(true);particles=[];}
  }
});
document.addEventListener('keypress',e=>{const tag=document.activeElement.tagName;if(tag==='INPUT'||tag==='TEXTAREA')return;if(state!=='INPUT'||e.ctrlKey||e.metaKey)return;if(e.key.length===1)inputBuffer+=e.key;});
document.addEventListener('keyup',e=>{if(e.key==='Control')ctrlDown=false;});

function confirmWord(){const w=inputBuffer.trim();if(!w)return;if(editingIndex>=0){textData[editingIndex][0]=w;editingIndex=-1;}else{textData.push(newWord(w));}inputBuffer='';}

function showMobileBar(){document.getElementById('mobileBar').classList.add('show');setTimeout(()=>document.getElementById('mobField').focus(),80);}
function hideMobileBar(){document.getElementById('mobileBar').classList.remove('show');document.getElementById('mobField').blur();}

document.getElementById('mobAdd').addEventListener('click',()=>{
  const v=document.getElementById('mobField').value.trim();if(!v)return;
  if(editingIndex>=0){textData[editingIndex][0]=v;editingIndex=-1;}
  else{v.split(/\s+/).filter(Boolean).forEach(w=>textData.push(newWord(w)));}
  document.getElementById('mobField').value='';document.getElementById('mobField').focus();
});
document.getElementById('mobPaste').addEventListener('click',()=>{
  navigator.clipboard.readText().then(txt=>{if(!txt.trim())return;txt.trim().split(/\s+/).filter(Boolean).forEach(w=>textData.push(newWord(w)));}).catch(()=>document.getElementById('mobField').focus());
});
document.getElementById('mobClearAll').addEventListener('click',()=>{textData=[];inputBuffer='';editingIndex=-1;groupSel=[];document.getElementById('mobField').value='';});
document.getElementById('mobDone').addEventListener('click',()=>{
  const v=document.getElementById('mobField').value.trim();
  if(v){v.split(/\s+/).filter(Boolean).forEach(w=>textData.push(newWord(w)));document.getElementById('mobField').value='';}
  hideMobileBar();state='MENU';
});
document.getElementById('mobField').addEventListener('keydown',e=>{if(e.key==='Enter'){document.getElementById('mobAdd').click();e.preventDefault();}});

function openBgPanel(){document.getElementById('bgPanel').classList.remove('hidden');updateBgInfo();}
function closeBgPanel(){document.getElementById('bgPanel').classList.add('hidden');}
document.getElementById('bgBtnClose').addEventListener('click',closeBgPanel);
['Menu','Display','Both'].forEach(t=>{document.getElementById('bgBtn'+t).addEventListener('click',()=>{bgPickTarget=t.toLowerCase();updateBgTargetBtns();});});
document.getElementById('bgBtnLoad').addEventListener('click',()=>{const v=document.getElementById('bgPathInput').value.trim();if(v){loadBg(v,bgPickTarget);showBgMsg('Loaded!',true);}});
document.getElementById('bgBtnClear').addEventListener('click',()=>{clearBg(bgPickTarget);showBgMsg('Cleared',true);});
document.getElementById('bgBtnImport').addEventListener('click',()=>document.getElementById('bgFileInput').click());
document.getElementById('bgFileInput').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;loadBg(URL.createObjectURL(f),bgPickTarget);showBgMsg(`Loaded: ${f.name.slice(0,26)}`,true);});
function updateBgTargetBtns(){['menu','display','both'].forEach(t=>{const id='bgBtn'+t.charAt(0).toUpperCase()+t.slice(1),btn=document.getElementById(id);btn.style.background=t===bgPickTarget?'#559bff':'#3c3c4e';btn.style.color=t===bgPickTarget?'#0c0c0e':'#f5f5f8';});}
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(!f)return;loadBg(URL.createObjectURL(f),bgPickTarget);showBgMsg(`Loaded: ${f.name.slice(0,26)}`,true);});

function openNotePanel(idx){noteEditIdx=idx;document.getElementById('notePanelTitle').textContent=`Note: "${textData[idx][0]}"`;document.getElementById('noteInput').value=textData[idx][7]||'';document.getElementById('notePanel').classList.remove('hidden');setTimeout(()=>document.getElementById('noteInput').focus(),50);}
function closeNotePanel(){document.getElementById('notePanel').classList.add('hidden');noteEditIdx=-1;}
document.getElementById('noteSave').addEventListener('click',()=>{if(noteEditIdx>=0)textData[noteEditIdx][7]=document.getElementById('noteInput').value.trim();closeNotePanel();});
document.getElementById('noteClear').addEventListener('click',()=>{document.getElementById('noteInput').value='';});
document.getElementById('noteCancel').addEventListener('click',closeNotePanel);
document.getElementById('noteInput').addEventListener('keydown',e=>{if(e.ctrlKey&&e.key==='Enter'){if(noteEditIdx>=0)textData[noteEditIdx][7]=e.target.value.trim();closeNotePanel();}else if(e.key==='Escape')closeNotePanel();});

function openQuestionPanel(){
  document.getElementById('qYesText').value=questionData.yesText||'';
  document.getElementById('qYesLabel').value=questionData.yesLabel||'Yes';
  document.getElementById('qNoLabel').value=questionData.noLabel||'No';
  document.getElementById('questionPanel').classList.remove('hidden');
  setTimeout(()=>document.getElementById('qYesText').focus(),50);
}
function closeQuestionPanel(){document.getElementById('questionPanel').classList.add('hidden');}
document.getElementById('qSave').addEventListener('click',()=>{
  questionData.yesText=document.getElementById('qYesText').value.trim();
  questionData.yesLabel=document.getElementById('qYesLabel').value.trim()||'Yes';
  questionData.noLabel=document.getElementById('qNoLabel').value.trim()||'No';
  questionData.active=true;closeQuestionPanel();
});
document.getElementById('qRemove').addEventListener('click',()=>{questionData={active:false,yesText:'',yesLabel:'Yes',noLabel:'No'};closeQuestionPanel();});
document.getElementById('qCancel').addEventListener('click',closeQuestionPanel);

function serializeData(){try{return btoa(unescape(encodeURIComponent(JSON.stringify({words:textData,q:questionData}))));}catch{return '';}}
function deserializeData(s){try{const d=JSON.parse(decodeURIComponent(escape(atob(s))));if(d.words)return d;if(Array.isArray(d))return{words:d,q:{active:false,yesText:'',yesLabel:'Yes',noLabel:'No'}};return null;}catch{return null;}}

function openSharePanel(){
  if(!textData.length){showToast('No content to share');return;}
  const enc=serializeData();
  document.getElementById('shareLinkInput').value=`${location.origin}${location.pathname}?d=${enc}`;
  document.getElementById('shareMsg').textContent='';
  document.getElementById('sharePanel').classList.remove('hidden');
}
function closeSharePanel(){document.getElementById('sharePanel').classList.add('hidden');}
document.getElementById('shareClose').addEventListener('click',closeSharePanel);
document.getElementById('shareCopy').addEventListener('click',()=>{
  const v=document.getElementById('shareLinkInput').value;
  navigator.clipboard.writeText(v).then(()=>{document.getElementById('shareMsg').textContent='Copied!';showToast('Link copied!');}).catch(()=>{document.getElementById('shareLinkInput').select();document.execCommand('copy');document.getElementById('shareMsg').textContent='Copied!';});
});
document.getElementById('shareLinkInput').addEventListener('click',e=>e.target.select());

function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.opacity='1';setTimeout(()=>el.style.opacity='0',2400);}
function toggleFullscreen(){if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{});else document.exitFullscreen().catch(()=>{});}

const urlParams=new URLSearchParams(location.search),sharedRaw=urlParams.get('d');
if(sharedRaw){const p=deserializeData(sharedRaw);if(p?.words?.length){textData=p.words;if(p.q)questionData=p.q;state='DISPLAY';clearDisplay(true);}}
</script>
</body>
